<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=750, initial-scale=1.0">
<title>Wolf Hunter</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 750px;
    height: 750px;
    overflow: hidden;
    background: #0a1628;
    margin: 0 auto;
  }

  .bg {
    position: absolute;
    inset: 0;
    background: url('assets/loading/loadingloki.jpg') center center / cover no-repeat;
  }

  /* dark gradient only at bottom for button readability */
  .bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(4,10,24,0.75) 0%, transparent 50%);
  }

  #start-btn {
    position: absolute;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    padding: 16px 64px;
    font-family: 'Cinzel', serif;
    font-size: 16px;
    font-weight: 900;
    letter-spacing: 4px;
    color: #0a1628;
    background: linear-gradient(135deg, #f5dfa0 0%, #e8c96a 50%, #b8962a 100%);
    border: none;
    border-radius: 4px;
    cursor: pointer;
    text-transform: uppercase;
    box-shadow: 0 0 30px rgba(232,201,106,0.5), 0 6px 20px rgba(0,0,0,0.6);
    overflow: hidden;
    animation: pulse 2.5s ease-in-out infinite;
  }
  #start-btn::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 60%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
    transform: skewX(-20deg);
    animation: shimmer 3s ease-in-out 1s infinite;
  }
  @keyframes shimmer {
    0% { left: -100%; }
    60%, 100% { left: 150%; }
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 25px rgba(232,201,106,0.4), 0 6px 20px rgba(0,0,0,0.6); }
    50% { box-shadow: 0 0 50px rgba(232,201,106,0.75), 0 6px 20px rgba(0,0,0,0.6); }
  }
  #start-btn:active { transform: translateX(-50%) scale(0.96); }

  /* ── LOADING ── */
  #loading-wrap {
    display: none;
    position: absolute;
    bottom: 70px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    width: 340px;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .bar-track {
    width: 100%;
    height: 5px;
    background: rgba(255,255,255,0.1);
    border-radius: 3px;
    border: 1px solid rgba(232,201,106,0.2);
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #b8962a, #e8c96a, #f5dfa0);
    border-radius: 3px;
    transition: width 0.08s linear;
    box-shadow: 0 0 8px rgba(232,201,106,0.7);
  }

  .pct {
    font-family: 'Cinzel', serif;
    font-size: 20px;
    font-weight: 700;
    color: #f5dfa0;
    text-shadow: 0 0 14px rgba(232,201,106,0.6);
  }
</style>
</head>
<body>

<div class="bg"></div>

<button id="start-btn" onclick="startLoading()">▶ START GAME</button>

<div id="loading-wrap">
  <div class="bar-track"><div class="bar-fill" id="bar"></div></div>
  <div class="pct" id="pct">0%</div>
</div>

<script>
  let progress = 0;

  function startLoading() {
    const btn = document.getElementById('start-btn');
    const wrap = document.getElementById('loading-wrap');

    btn.style.transition = 'opacity 0.35s';
    btn.style.opacity = '0';
    btn.style.pointerEvents = 'none';

    setTimeout(() => {
      btn.style.display = 'none';
      wrap.style.display = 'flex';
      tick();
    }, 350);
  }

  function tick() {
    if (progress >= 100) {
      document.getElementById('bar').style.width = '100%';
      document.getElementById('pct').textContent = '100%';
      setTimeout(() => { window.location.href = 'game.html'; }, 700);
      return;
    }

    let step;
    if (progress < 30) step = Math.random() * 2.5 + 0.5;
    else if (progress < 70) step = Math.random() * 1.5 + 0.3;
    else step = Math.random() * 0.8 + 0.1;

    const delay = Math.random() < 0.08 ? 350 : 65;
    progress = Math.min(100, progress + step);

    document.getElementById('bar').style.width = progress.toFixed(1) + '%';
    document.getElementById('pct').textContent = Math.floor(progress) + '%';

    setTimeout(tick, delay);
  }
</script>

</body>
</html>
