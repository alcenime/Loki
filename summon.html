<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=750, initial-scale=1.0" name="viewport"/>
<title>Wolf Hunter - Summon</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&amp;family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,400&amp;family=Rajdhani:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<style>
  :root {
    --gold: #e8c96a;
    --gold-light: #f5dfa0;
    --gold-dark: #b8962a;
    --blue-deep: #0a1628;
    --blue-mid: #112240;
    --blue-bright: #1e4080;
    --blue-sky: #4a90d9;
    --blue-glow: #6ab4ff;
    --silver: #c8d8ee;
    --white: #f0f4ff;
    --red-alert: #e84040;
    --purple-gem: #7b5ea7;
    --gem-blue: #4a9eff;
    --panel-bg: rgba(10,22,50,0.85);
    --panel-border: rgba(232,201,106,0.3);
    --topbar-h: 64px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 100vw; height: 750px;
    overflow: hidden;
    background: #0a1628 url('assets/dashboard/backgroundloki.png') center center / cover no-repeat;
    font-family: 'Rajdhani', sans-serif;
    color: var(--white);
    position: relative;
  }

  .wrapper {
    position: relative; z-index: 2;
    width: 100%; height: 750px;
    display: flex; flex-direction: row;
  }

  .center-col {
    flex: 1; display: flex; flex-direction: column;
    overflow: hidden; min-width: 0;
  }

  /* ─── TOPBAR ─── */
  .topbar {
    height: var(--topbar-h);
    background: linear-gradient(180deg, rgba(5,12,30,0.95) 0%, rgba(10,22,50,0.85) 100%);
    border-bottom: 1px solid rgba(232,201,106,0.25);
    display: flex; align-items: center;
    padding: 0 12px; gap: 8px;
    flex-shrink: 0;
    backdrop-filter: blur(6px);
  }
  .top-spacer { flex: 1; }
  .currency-group { display: flex; align-items: center; gap: 6px; }
  .currency-pill {
    display: flex; align-items: center; gap: 6px;
    background: rgba(5,12,30,0.7);
    border: 1px solid rgba(232,201,106,0.25);
    border-radius: 20px;
    padding: 6px 12px 6px 10px;
    font-size: 14px; font-weight: 600;
    color: var(--white);
  }
  .currency-pill .icon { font-size: 18px; }
  .currency-pill .plus-btn {
    width: 20px; height: 20px;
    border-radius: 50%;
    background: var(--gold);
    color: var(--blue-deep);
    font-size: 13px; font-weight: 900;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0; margin-left: 2px;
  }
  .energy-pill {
    display: flex; align-items: center; gap: 6px;
    background: rgba(5,12,30,0.7);
    border: 1px solid rgba(160,96,255,0.35);
    border-radius: 20px;
    padding: 6px 12px 6px 10px;
    font-size: 14px; font-weight: 600;
  }
  .energy-icon { color: #a060ff; font-size: 18px; }
  .connect-wallet-btn-top {
    display: flex; align-items: center; gap: 7px;
    padding: 8px 16px;
    background: linear-gradient(135deg, rgba(18,36,80,0.95), rgba(26,52,110,0.9));
    border: 1px solid rgba(232,201,106,0.5);
    border-radius: 20px;
    cursor: pointer;
    font-family: 'Cinzel', serif;
    font-size: 10px; font-weight: 700;
    color: var(--gold-light);
    letter-spacing: 0.4px;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .connect-wallet-btn-top:hover { border-color: var(--gold); }

  /* ─── BODY ─── */
  .body-row { flex: 1; overflow: hidden; display: flex; }

  /* ═══════════════════════════════════════════
     SIDEBAR
  ═══════════════════════════════════════════ */
  .sidebar {
    width: 178px;
    background: linear-gradient(180deg, rgba(5,11,28,0.99) 0%, rgba(8,16,38,0.98) 40%, rgba(6,13,32,0.99) 100%);
    border-right: 1px solid rgba(232,201,106,0.22);
    flex-shrink: 0;
    display: flex; flex-direction: column;
    position: relative; overflow: hidden;
  }
  .sidebar::before {
    content: '';
    position: absolute; top: 0; right: 0;
    width: 1px; height: 100%;
    background: linear-gradient(180deg, transparent 0%, rgba(232,201,106,0.6) 20%, rgba(232,201,106,0.6) 80%, transparent 100%);
    box-shadow: 0 0 8px rgba(232,201,106,0.15);
    z-index: 10;
  }
  .sidebar::after {
    content: '';
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    background: radial-gradient(ellipse 60% 30% at 50% 50%, rgba(74,144,217,0.04) 0%, transparent 70%);
    pointer-events: none;
  }
  .sidebar-profile {
    display: flex; align-items: center; gap: 8px;
    padding: 14px 12px 12px 14px;
    flex-shrink: 0; position: relative;
  }
  .sidebar-profile::after {
    content: '';
    position: absolute; bottom: 0; left: 14px; right: 14px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(232,201,106,0.35), transparent);
  }
  .sidebar-profile .profile-avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #4a7ab5, #1a3060);
    border: 1.5px solid rgba(232,201,106,0.7);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    box-shadow: 0 0 10px rgba(106,180,255,0.35);
    flex-shrink: 0; overflow: hidden;
  }
  .sidebar-profile .profile-name {
    font-family: 'Cinzel', serif; font-size: 10.5px; font-weight: 700;
    color: var(--gold-light); letter-spacing: 0.5px; line-height: 1.2;
  }
  .sidebar-profile .profile-level {
    font-size: 9.5px; color: rgba(200,216,238,0.65);
    display: flex; align-items: center; gap: 4px; margin-top: 3px;
  }
  .sidebar-profile .xp-bar {
    width: 44px; height: 2px; background: rgba(255,255,255,0.1);
    border-radius: 2px; overflow: hidden; display: inline-block; vertical-align: middle;
  }
  .sidebar-profile .xp-fill {
    height: 100%; width: 67%;
    background: linear-gradient(90deg, var(--gold-dark), var(--gold));
    border-radius: 2px; box-shadow: 0 0 4px rgba(232,201,106,0.5);
  }
  .sidebar-nav { flex: 1; padding: 6px 0 4px; display: flex; flex-direction: column; gap: 0; }
  .nav-divider {
    display: flex; align-items: center;
    padding: 8px 12px 6px; gap: 6px; flex-shrink: 0;
  }
  .nav-divider::before, .nav-divider::after {
    content: ''; flex: 1; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(232,201,106,0.28), transparent);
  }
  .nav-divider-gem {
    width: 5px; height: 5px; background: rgba(232,201,106,0.6);
    transform: rotate(45deg); flex-shrink: 0;
    box-shadow: 0 0 6px rgba(232,201,106,0.4);
  }
  .nav-item {
    display: flex; align-items: center; gap: 9px;
    padding: 7px 10px 7px 14px;
    cursor: pointer; position: relative;
    transition: all 0.18s ease;
    margin: 1px 6px 1px 0;
    border-radius: 0 6px 6px 0;
    border: 1px solid transparent; border-left: none;
    background: transparent;
  }
  .nav-item:hover {
    background: rgba(232,201,106,0.06);
    border-color: rgba(232,201,106,0.1); border-left: none;
  }
  .nav-item.active {
    background: linear-gradient(90deg, rgba(74,144,217,0.14) 0%, rgba(74,144,217,0.06) 100%);
    border-color: rgba(232,201,106,0.18); border-left: none;
    box-shadow: inset 0 0 12px rgba(74,144,217,0.08);
  }
  .nav-item.active::before {
    content: '';
    position: absolute; left: 0; top: 50%; transform: translateY(-50%);
    width: 2.5px; height: 55%;
    background: linear-gradient(180deg, rgba(232,201,106,0.4), var(--gold), rgba(232,201,106,0.4));
    border-radius: 0 2px 2px 0;
    box-shadow: 0 0 8px rgba(232,201,106,0.7), 0 0 16px rgba(232,201,106,0.3);
  }
  .nav-icon {
    width: 24px; height: 24px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    background: transparent; flex-shrink: 0; overflow: hidden; transition: all 0.18s;
  }
  .nav-icon img {
    width: 18px; height: 18px; object-fit: contain;
    filter: brightness(0.55) saturate(0.6); transition: filter 0.18s;
  }
  .nav-item:hover .nav-icon img { filter: brightness(0.8) saturate(0.8); }
  .nav-item.active .nav-icon { background: rgba(232,201,106,0.1); }
  .nav-item.active .nav-icon img { filter: brightness(1) saturate(1.2) drop-shadow(0 0 5px rgba(232,201,106,0.7)); }
  .nav-label {
    font-family: 'Cinzel', serif; font-size: 10.5px; font-weight: 600;
    color: rgba(200,216,238,0.45); letter-spacing: 0.5px; transition: color 0.18s;
  }
  .nav-item:hover .nav-label { color: rgba(200,216,238,0.7); }
  .nav-item.active .nav-label { color: var(--gold-light); text-shadow: 0 0 12px rgba(232,201,106,0.4); }
  .sidebar-portrait {
    width: 100%; padding: 8px 10px 12px;
    position: relative; flex-shrink: 0;
  }
  .sidebar-portrait::before {
    content: '';
    position: absolute; top: 0; left: 14px; right: 14px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(232,201,106,0.25), transparent);
  }
  .wolf-medallion {
    width: 100px; height: 100px;
    margin: 0 auto;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .wolf-medallion::before {
    content: '';
    position: absolute; inset: -10px; border-radius: 50%;
    background: radial-gradient(circle, rgba(232,201,106,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  /* ═══════════════════════════════════════════
     RIGHT PANEL — SUMMON MENU
  ═══════════════════════════════════════════ */
  .right-panel {
    width: 195px;
    flex-shrink: 0;
    background: linear-gradient(180deg, rgba(4,9,24,0.98) 0%, rgba(7,14,34,0.97) 100%);
    border-left: 1px solid rgba(232,201,106,0.18);
    display: flex;
    flex-direction: column;
    padding: 14px 10px;
    gap: 10px;
    overflow-y: auto;
    overflow-x: hidden;
  }

  .rp-title {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 2.5px;
    text-align: center;
    text-transform: uppercase;
    padding-bottom: 10px;
    border-bottom: 1px solid rgba(232,201,106,0.18);
    flex-shrink: 0;
    text-shadow: 0 0 12px rgba(232,201,106,0.4);
  }

  /* ── Menu card row ── */
  .rp-card {
    position: relative;
    width: 100%;
    border-radius: 0;
    overflow: hidden;
    background: #060d20;
    border: none;
    flex-shrink: 0;
    cursor: pointer;
    transition: box-shadow 0.2s;
  }

  /* Decorative gold frame overlay */
  .rp-card::after {
    content: '';
    position: absolute;
    inset: 0;
    pointer-events: none;
    border: 1px solid rgba(232,201,106,0.35);
    z-index: 2;
  }

  /* Corner accents */
  .rp-card::before {
    content: '';
    position: absolute;
    inset: 4px;
    pointer-events: none;
    border: 1px solid rgba(232,201,106,0.15);
    z-index: 2;
  }

  .rp-frame {
    position: absolute;
    inset: 0;
    z-index: 3;
    pointer-events: none;
  }

  .rp-frame svg {
    width: 100%;
    height: 100%;
  }

  .rp-card.active {
    border: none;
    box-shadow: 0 0 16px rgba(232,201,106,0.1), 0 0 30px rgba(74,144,217,0.08);
  }

  .rp-card:hover {
    border: none;
    box-shadow: 0 4px 16px rgba(0,0,0,0.5), 0 0 14px rgba(232,201,106,0.1);
  }

  .rp-card-thumb {
    width: 100%;
    display: block;
    height: 100%;
  }

  .rp-card-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.25s ease;
  }

  .rp-card.active { height: 110px; }
  .rp-card:not(.active) { height: 100px; }

  .rp-card:hover .rp-card-thumb img {
    transform: scale(1.03);
  }

  .rp-card-body { display: none; }
  .rp-card-arrow { display: none; }

  .rp-spacer { flex: 1; }
  .rp-pity-box {
    background: rgba(6,12,34,0.85);
    border: 1px solid rgba(232,201,106,0.15);
    border-radius: 8px;
    padding: 7px 8px;
    flex-shrink: 0;
  }
  .rp-pity-label {
    font-family: 'Cinzel', serif; font-size: 7.5px; font-weight: 700;
    color: rgba(232,201,106,0.45); letter-spacing: 1.2px; text-transform: uppercase;
    margin-bottom: 5px; text-align: center;
  }
  .rp-pity-bar-wrap {
    background: rgba(255,255,255,0.07); border-radius: 3px;
    height: 4px; overflow: hidden; margin-bottom: 4px;
  }
  .rp-pity-bar-fill {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, var(--gold-dark), var(--gold));
    border-radius: 3px;
    box-shadow: 0 0 5px rgba(232,201,106,0.5);
    transition: width 0.4s ease;
  }
  .rp-pity-count {
    display: flex; justify-content: space-between;
    font-size: 8px; color: rgba(180,200,230,0.45);
    font-family: 'Rajdhani', sans-serif; font-weight: 600;
  }
  .rp-pity-count span { color: var(--gold-light); font-size: 9px; }

  /* ═══════════════════════════════════════════
     MAIN CONTENT — SUMMON
  ═══════════════════════════════════════════ */
  .main-content {
    flex: 1; display: flex; flex-direction: column;
    overflow: hidden; min-width: 0; position: relative;
  }

  /* Page header */
  .summon-header {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px 8px;
    flex-shrink: 0;
    border-bottom: 1px solid rgba(232,201,106,0.1);
  }
  .summon-header-icon {
    width: 38px; height: 38px; border-radius: 50%;
    background: radial-gradient(circle at 40% 35%, rgba(106,180,255,0.5), rgba(20,50,120,0.9));
    border: 1.5px solid rgba(74,144,217,0.5);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    box-shadow: 0 0 16px rgba(74,144,217,0.4);
    flex-shrink: 0;
  }
  .summon-header-title {
    font-family: 'Cinzel', serif; font-size: 22px; font-weight: 900;
    color: var(--white); letter-spacing: 1px;
    text-shadow: 0 0 20px rgba(106,180,255,0.3);
    display: flex; align-items: center; gap: 8px;
  }
  .summon-header-q {
    width: 18px; height: 18px; border-radius: 50%;
    border: 1.5px solid rgba(200,216,238,0.35);
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; color: rgba(200,216,238,0.5);
    cursor: pointer; font-weight: 700;
  }
  .summon-header-sub {
    font-size: 10px; color: rgba(200,216,238,0.45);
    font-family: 'Crimson Pro', serif; font-style: italic;
    margin-top: 2px;
  }

  /* Middle zone: altar + right panel */
  .summon-body { flex: 1; display: flex; overflow: hidden; }

  /* ─── ALTAR AREA ─── */
  .altar-area {
    flex: 1; position: relative; overflow: hidden;
    display: flex; flex-direction: column; align-items: center;
  }

  /* Deep dark bg with mystical atmosphere */
  .altar-bg {
    position: absolute; inset: 0;
    background: url('assets/summon/bg_summon.jpg') center center / cover no-repeat,
      linear-gradient(180deg, rgba(6,14,36,0.6) 0%, rgba(4,10,28,0.9) 100%);
  }
  .altar-bg::after {
    content: '';
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 30%, rgba(20,60,180,0.25) 0%, transparent 70%),
      radial-gradient(ellipse 50% 40% at 50% 85%, rgba(4,10,28,0.7) 0%, transparent 100%);
  }

  /* Magic circle on floor */
  .magic-circle {
    position: absolute;
    bottom: 110px; left: 50%; transform: translateX(-50%);
    width: 280px; height: 80px;
    border-radius: 50%;
    border: 2px solid rgba(74,144,217,0.7);
    box-shadow:
      0 0 30px rgba(74,144,217,0.5),
      0 0 60px rgba(74,144,217,0.25),
      inset 0 0 30px rgba(74,144,217,0.12);
    animation: circleGlow 3s ease-in-out infinite;
    z-index: 3;
  }
  .magic-circle::before {
    content: '';
    position: absolute; inset: 10px;
    border-radius: 50%;
    border: 1.5px solid rgba(74,144,217,0.4);
    box-shadow: 0 0 15px rgba(74,144,217,0.3);
  }
  .magic-circle::after {
    content: '';
    position: absolute; inset: 22px;
    border-radius: 50%;
    border: 1px dashed rgba(100,180,255,0.3);
    animation: circleSpin 12s linear infinite;
  }
  @keyframes circleSpin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  @keyframes circleGlow {
    0%, 100% { box-shadow: 0 0 30px rgba(74,144,217,0.5), 0 0 60px rgba(74,144,217,0.25), inset 0 0 30px rgba(74,144,217,0.12); border-color: rgba(74,144,217,0.7); }
    50% { box-shadow: 0 0 50px rgba(74,144,217,0.8), 0 0 100px rgba(74,144,217,0.4), inset 0 0 50px rgba(74,144,217,0.2); border-color: rgba(120,200,255,0.9); }
  }

  /* Wolf spirit + gem centerpiece */
  .altar-wolf {
    position: absolute;
    bottom: 170px; left: 50%; transform: translateX(-50%);
    width: 100px; height: 100px;
    display: flex; align-items: center; justify-content: center;
    animation: wolfFloat 4s ease-in-out infinite;
    z-index: 3;
  }
  @keyframes wolfFloat {
    0%, 100% { transform: translateX(-50%) translateY(0px); }
    50% { transform: translateX(-50%) translateY(-12px); }
  }

  /* Gem crystal */
  .altar-gem {
    position: absolute;
    bottom: 130px; left: 50%; transform: translateX(-50%);
    width: 50px; height: 65px;
    background: linear-gradient(160deg, #c0d8ff 0%, #6ab4ff 30%, #4a6eff 60%, #1030c0 100%);
    clip-path: polygon(50% 0%, 100% 35%, 80% 100%, 20% 100%, 0% 35%);
    box-shadow: 0 0 30px rgba(74,144,217,1), 0 0 60px rgba(74,100,255,0.7), 0 0 100px rgba(50,80,255,0.4);
    animation: gemPulse 2s ease-in-out infinite;
    z-index: 4;
  }
  .altar-gem::before {
    content: '';
    position: absolute; top: 5px; left: 30%; width: 30%; height: 40%;
    background: linear-gradient(160deg, rgba(255,255,255,0.6), transparent);
    clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
  }
  @keyframes gemPulse {
    0%, 100% { box-shadow: 0 0 30px rgba(74,144,217,1), 0 0 60px rgba(74,100,255,0.7), 0 0 100px rgba(50,80,255,0.4); }
    50% { box-shadow: 0 0 50px rgba(120,200,255,1), 0 0 100px rgba(74,120,255,0.9), 0 0 150px rgba(50,80,255,0.6); }
  }

  /* Moon */
  .altar-moon {
    position: absolute;
    top: 12px; left: 50%; transform: translateX(-50%);
    width: 110px; height: 110px;
    border-radius: 50%;
    background: radial-gradient(circle at 38% 38%, #e8e0c0, #c8b870, #907830);
    box-shadow: 0 0 30px rgba(220,200,120,0.4), 0 0 60px rgba(200,180,80,0.15);
    opacity: 0.6;
    z-index: 1;
  }
  .altar-moon::before {
    content: '';
    position: absolute; inset: 0; border-radius: 50%;
    background: radial-gradient(circle at 65% 35%, transparent 40%, rgba(60,40,10,0.4) 100%);
  }

  /* Pillars */
  .pillar-left, .pillar-right {
    position: absolute; bottom: 100px;
    width: 18px;
    background: linear-gradient(180deg, rgba(80,120,200,0.4), rgba(40,70,150,0.2));
    border: 1px solid rgba(74,144,217,0.25);
    border-radius: 2px 2px 0 0;
    z-index: 2;
  }
  .pillar-left { left: 14%; height: 110px; }
  .pillar-right { right: 14%; height: 110px; }
  .pillar-left::before, .pillar-right::before {
    content: '';
    position: absolute; top: -8px; left: -4px; right: -4px; height: 8px;
    background: rgba(74,144,217,0.3);
    border: 1px solid rgba(74,144,217,0.3);
    border-radius: 2px;
  }
  /* Torches on pillars */
  .torch-left, .torch-right {
    position: absolute; bottom: 215px;
    width: 14px; height: 30px;
    z-index: 2;
    display: flex; flex-direction: column; align-items: center;
  }
  .torch-left { left: calc(14% - 2px); }
  .torch-right { right: calc(14% - 4px); }
  .flame-css {
    width: 12px; height: 18px;
    background: radial-gradient(ellipse at 50% 80%, #ff8c00, #ff4400, #ff2000);
    border-radius: 50% 50% 30% 30% / 60% 60% 40% 40%;
    box-shadow: 0 0 10px rgba(255,120,0,0.9), 0 0 20px rgba(255,80,0,0.5);
    animation: flameDance 0.8s ease-in-out infinite alternate;
    transform-origin: bottom center;
  }
  @keyframes flameDance {
    0% { transform: scaleX(1) scaleY(1) skewX(-3deg); opacity: 0.9; box-shadow: 0 0 10px rgba(255,120,0,0.9), 0 0 20px rgba(255,80,0,0.5); }
    100% { transform: scaleX(0.85) scaleY(1.1) skewX(3deg); opacity: 1; box-shadow: 0 0 14px rgba(255,160,0,1), 0 0 28px rgba(255,100,0,0.7); }
  }
  @keyframes torchFlicker {
    0%, 100% { filter: drop-shadow(0 0 8px rgba(232,160,48,0.8)); transform: scale(1); }
    50% { filter: drop-shadow(0 0 14px rgba(255,180,50,1)); transform: scale(1.05); }
  }

  /* Blue energy particles */
  .energy-particle {
    position: absolute;
    width: 3px; height: 3px; border-radius: 50%;
    background: #6ab4ff;
    box-shadow: 0 0 6px rgba(106,180,255,0.8);
    animation: particleRise linear infinite;
    pointer-events: none; z-index: 3;
  }
  @keyframes particleRise {
    0% { opacity: 0; transform: translateY(0) translateX(0); }
    20% { opacity: 1; }
    80% { opacity: 0.5; }
    100% { opacity: 0; transform: translateY(-80px) translateX(var(--dx, 10px)); }
  }

  /* ─── SUMMON BUTTONS ─── */
  .summon-btns {
    position: absolute; bottom: 62px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 12px; z-index: 5; white-space: nowrap;
  }
  .summon-btn {
    display: flex; flex-direction: column; align-items: center;
    padding: 12px 36px 10px;
    border-radius: 10px;
    border: 1.5px solid rgba(74,144,217,0.7);
    background: linear-gradient(160deg, rgba(8,20,60,0.97), rgba(14,32,90,0.95));
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
    box-shadow: 0 0 20px rgba(74,144,217,0.3), inset 0 1px 0 rgba(106,180,255,0.15);
    min-width: 130px;
  }
  .summon-btn::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(106,180,255,0.6), transparent);
  }
  .summon-btn:hover {
    border-color: rgba(106,180,255,0.9);
    box-shadow: 0 0 24px rgba(74,144,217,0.4), 0 0 48px rgba(74,144,217,0.15), inset 0 1px 0 rgba(106,180,255,0.2);
    transform: translateY(-2px);
    background: linear-gradient(160deg, rgba(14,32,90,0.98), rgba(22,48,130,0.95));
  }
  .summon-btn-title {
    font-family: 'Cinzel', serif; font-size: 14px; font-weight: 800;
    color: var(--white); letter-spacing: 0.8px;
    text-shadow: 0 0 12px rgba(106,180,255,0.5);
    text-transform: uppercase;
  }
  .summon-btn-cost {
    display: flex; align-items: center; gap: 4px;
    font-size: 12px; font-weight: 700;
    color: #b090ff; margin-top: 2px;
  }
  .gem-icon { font-size: 13px; }

  /* Guarantee text */
  .summon-guarantee {
    position: absolute; bottom: 42px; left: 50%; transform: translateX(-50%);
    font-size: 10px; color: rgba(200,216,238,0.55);
    font-family: 'Rajdhani', sans-serif;
    white-space: nowrap; z-index: 5;
    display: flex; align-items: center; gap: 4px;
  }
  .guarantee-sr { color: #e8a030; font-weight: 700; }

  /* Wolf collection bottom */
  .wolf-collection {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 130px;
    background: linear-gradient(180deg, transparent 0%, rgba(4,10,28,0.96) 30%);
    border-top: 1px solid rgba(232,201,106,0.2);
    padding: 6px 10px 6px;
    z-index: 5;
    display: flex; flex-direction: column;
  }
  .collection-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 6px; flex-shrink: 0;
  }
  .collection-title {
    font-family: 'Cinzel', serif; font-size: 12px; font-weight: 700;
    color: var(--gold); letter-spacing: 0.5px;
    display: flex; align-items: center; gap: 6px;
  }
  .collection-count {
    font-size: 10px; color: rgba(200,216,238,0.4);
    font-weight: 600;
  }
  .view-all-btn {
    font-family: 'Cinzel', serif; font-size: 9px; font-weight: 600;
    color: rgba(232,201,106,0.6);
    border: 1px solid rgba(232,201,106,0.25);
    border-radius: 4px; padding: 3px 8px;
    cursor: pointer; transition: all 0.2s;
  }
  .view-all-btn:hover { color: var(--gold); border-color: rgba(232,201,106,0.6); }

  .wolf-cards-row {
    display: flex; gap: 5px; overflow: hidden;
    flex: 1;
  }
  .wolf-card {
    flex: 1; min-width: 0;
    border-radius: 6px;
    border: 1.5px solid rgba(232,201,106,0.2);
    background: linear-gradient(160deg, rgba(8,18,46,0.95), rgba(14,28,70,0.9));
    position: relative; overflow: hidden;
    cursor: pointer; transition: all 0.18s;
    display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
    padding-bottom: 4px;
  }
  .wolf-card:hover { border-color: rgba(232,201,106,0.6); transform: translateY(-2px); }
  .wolf-card-bg {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 36px;
    opacity: 0.7;
  }
  .wolf-card-rarity {
    position: absolute; top: 4px; left: 4px;
    font-family: 'Cinzel', serif; font-size: 8px; font-weight: 800;
    padding: 1px 5px; border-radius: 3px;
    z-index: 2;
  }
  .rarity-ssr { background: rgba(160,80,220,0.8); color: #e8c0ff; border: 1px solid rgba(180,100,240,0.5); }
  .rarity-sr  { background: rgba(232,160,48,0.8);  color: #fff4c0; border: 1px solid rgba(255,180,60,0.5); }
  .rarity-r   { background: rgba(60,120,200,0.8);  color: #c0d8ff; border: 1px solid rgba(80,140,220,0.5); }
  .wolf-card-elem {
    position: absolute; top: 4px; right: 4px;
    font-size: 11px; z-index: 2;
  }
  .wolf-card-name {
    font-family: 'Cinzel', serif; font-size: 7.5px; font-weight: 700;
    color: var(--white); letter-spacing: 0.3px;
    text-transform: uppercase; z-index: 2;
    text-shadow: 0 1px 4px rgba(0,0,0,0.8);
    text-align: center;
  }
  /* Card glow colors */
  .card-moon   { border-color: rgba(120,80,200,0.4); }
  .card-water  { border-color: rgba(40,120,220,0.4); }
  .card-fire   { border-color: rgba(220,80,40,0.4); }
  .card-thunder{ border-color: rgba(220,200,40,0.4); }
  .card-nature { border-color: rgba(60,180,80,0.4); }

  /* Dot indicators */
  .collection-dots {
    display: flex; justify-content: center; gap: 5px;
    margin-top: 4px; flex-shrink: 0;
  }
  .dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(232,201,106,0.2); }
  .dot.active { background: rgba(232,201,106,0.7); }

  /* ─── RIGHT PANEL: Summon Info ─── */
  .summon-info-panel {
    width: 195px; flex-shrink: 0;
    background: rgba(6,14,36,0.97);
    border-left: 1px solid rgba(232,201,106,0.2);
    display: flex; flex-direction: column;
    overflow: hidden;
  }

  /* panel header */
  .sip-header {
    height: var(--topbar-h);
    display: flex; align-items: center; justify-content: center;
    padding: 0 10px;
    background: linear-gradient(180deg, rgba(5,12,30,0.95) 0%, rgba(10,22,50,0.85) 100%);
    border-bottom: 1px solid rgba(232,201,106,0.25);
    flex-shrink: 0;
  }
  .connect-wallet-btn {
    display: flex; align-items: center; justify-content: center; gap: 7px;
    padding: 7px 12px; width: 100%;
    background: linear-gradient(135deg, rgba(18,36,80,0.95), rgba(26,52,110,0.9));
    border: 1px solid rgba(232,201,106,0.5);
    border-radius: 20px; cursor: pointer;
    font-family: 'Cinzel', serif; font-size: 10px; font-weight: 700;
    color: var(--gold-light); letter-spacing: 0.4px;
    transition: all 0.2s;
    box-shadow: 0 0 12px rgba(232,201,106,0.1), inset 0 1px 0 rgba(232,201,106,0.1);
    white-space: nowrap;
  }
  .connect-wallet-btn:hover {
    border-color: var(--gold);
    box-shadow: 0 0 18px rgba(232,201,106,0.25), inset 0 1px 0 rgba(232,201,106,0.15);
    background: linear-gradient(135deg, rgba(24,46,100,0.98), rgba(34,64,130,0.95));
  }
  .wallet-icon { font-size: 14px; color: var(--gold); line-height: 1; }

  .sip-body { flex: 1; padding: 10px 10px; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }
  .sip-body::-webkit-scrollbar { width: 3px; }
  .sip-body::-webkit-scrollbar-thumb { background: rgba(232,201,106,0.2); border-radius: 2px; }

  /* Total summons block */
  .sip-block {
    background: rgba(10,22,50,0.7);
    border: 1px solid rgba(232,201,106,0.15);
    border-radius: 8px;
    padding: 8px 10px;
    position: relative; overflow: hidden;
  }
  .sip-block::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(232,201,106,0.35), transparent);
  }
  .sip-block-label {
    font-family: 'Cinzel', serif; font-size: 9px; font-weight: 600;
    color: rgba(200,216,238,0.45); letter-spacing: 0.8px; text-transform: uppercase;
    text-align: center; margin-bottom: 3px;
  }
  .sip-block-value {
    font-family: 'Cinzel', serif; font-size: 32px; font-weight: 900;
    color: var(--white); text-align: center; line-height: 1;
    text-shadow: 0 0 20px rgba(106,180,255,0.4);
  }
  .sip-divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(232,201,106,0.25), transparent);
    flex-shrink: 0;
  }

  /* Rates block */
  .sip-rates-title {
    font-family: 'Cinzel', serif; font-size: 10px; font-weight: 700;
    color: var(--gold); letter-spacing: 0.8px; text-align: center;
    margin-bottom: 6px;
  }
  .sip-rate-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 3px 0;
    border-bottom: 1px solid rgba(232,201,106,0.06);
  }
  .sip-rate-row:last-child { border-bottom: none; }
  .sip-rate-label {
    font-family: 'Rajdhani', sans-serif; font-size: 11px; font-weight: 600;
    color: rgba(200,216,238,0.65);
  }
  .sip-rate-val {
    font-family: 'Cinzel', serif; font-size: 11px; font-weight: 700;
    color: var(--white);
  }
  .rate-myth      { color: #f5dfa0; }
  .rate-legendary { color: #e84040; }
  .rate-epic      { color: #c060f0; }
  .rate-rare      { color: #40c0d0; }
  .rate-uncommon  { color: #50c060; }
  .rate-common    { color: #8090a0; }
  .rate-ssr { color: #d080ff; }
  .rate-sr  { color: #e8a030; }
  .rate-r   { color: #6ab4ff; }

  /* Element rates */
  .sip-elem-title {
    font-family: 'Cinzel', serif; font-size: 10px; font-weight: 700;
    color: var(--gold); letter-spacing: 0.8px; text-align: center;
    margin-bottom: 8px;
  }
  .sip-elem-row {
    display: flex; justify-content: space-between; align-items: flex-start;
    gap: 2px;
  }
  .sip-elem-item {
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    flex: 1;
  }
  .elem-circle {
    width: 26px; height: 26px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    border: 1.5px solid rgba(255,255,255,0.15);
  }
  .elem-moon   { background: rgba(100,60,180,0.5); border-color: rgba(140,90,220,0.4); }
  .elem-water  { background: rgba(40,100,200,0.5); border-color: rgba(74,144,217,0.4); }
  .elem-fire   { background: rgba(200,60,20,0.5);  border-color: rgba(240,100,50,0.4); }
  .elem-nature { background: rgba(40,150,60,0.5);  border-color: rgba(80,200,100,0.4); }
  .elem-thunder{ background: rgba(180,160,20,0.5); border-color: rgba(230,210,50,0.4); }
  .elem-pct {
    font-family: 'Rajdhani', sans-serif; font-size: 9.5px; font-weight: 700;
    color: rgba(200,216,238,0.65);
  }

  /* History button */
  .sip-history-btn {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    padding: 9px 10px;
    background: rgba(10,22,50,0.7);
    border: 1px solid rgba(232,201,106,0.25);
    border-radius: 7px;
    cursor: pointer; transition: all 0.2s;
    font-family: 'Cinzel', serif; font-size: 10px; font-weight: 700;
    color: rgba(232,201,106,0.7); letter-spacing: 0.5px;
    flex-shrink: 0; margin-top: auto;
  }
  .sip-history-btn:hover {
    border-color: rgba(232,201,106,0.6);
    color: var(--gold);
    background: rgba(16,32,70,0.8);
  }

  /* ─── GOLD PARTICLES ─── */
  .gold-particle {
    position: absolute; width: 3px; height: 3px; border-radius: 50%;
    background: var(--gold); animation: goldFloat linear infinite;
    opacity: 0; pointer-events: none; z-index: 1;
  }
  @keyframes goldFloat {
    0% { opacity: 0; transform: translateY(0) rotate(0deg); }
    15% { opacity: 0.8; }
    85% { opacity: 0.3; }
    100% { opacity: 0; transform: translateY(-120px) rotate(360deg); }
  }

  /* ─── REFERENCE-STYLE SUMMON BUTTONS ─── */
  .ref-summon-btn {
    position: relative; cursor: pointer;
    transition: transform 0.2s;
  }
  .ref-summon-btn:hover { transform: translateY(-3px); }
  .ref-summon-btn:hover img { filter: brightness(1.15) drop-shadow(0 0 18px rgba(106,180,255,0.7)) !important; }
  .ref-summon-btn:active { transform: translateY(0) scale(0.97); }

  .ref-btn-inner {
    display: flex; flex-direction: column; align-items: center;
    padding: 14px 38px 12px;
    border-radius: 6px;
  }
  .ref-btn-blue .ref-btn-inner {
    background: linear-gradient(160deg, rgba(6,16,50,0.97) 0%, rgba(10,24,70,0.95) 100%);
    border: 1.5px solid rgba(74,144,217,0.65);
    box-shadow: 0 0 18px rgba(74,144,217,0.25), inset 0 1px 0 rgba(106,180,255,0.12);
  }
  .ref-btn-gold .ref-btn-inner {
    background: linear-gradient(160deg, rgba(40,26,6,0.97) 0%, rgba(60,38,8,0.95) 100%);
    border: 1.5px solid rgba(184,150,42,0.75);
    box-shadow: 0 0 18px rgba(184,150,42,0.3), inset 0 1px 0 rgba(232,201,106,0.15);
  }

  .ref-btn-title {
    font-family: 'Cinzel', serif; font-size: 15px; font-weight: 800;
    color: var(--white); letter-spacing: 1px; text-transform: uppercase;
    text-shadow: 0 0 12px rgba(106,180,255,0.4);
  }
  .ref-btn-gold .ref-btn-title { text-shadow: 0 0 12px rgba(232,201,106,0.35); }
  .ref-btn-cost {
    display: flex; align-items: center; gap: 5px;
    margin-top: 4px;
    font-family: 'Cinzel', serif; font-size: 16px; font-weight: 700;
    color: var(--white);
  }

  /* Decorative corner ornaments */
  .ref-btn-corner {
    position: absolute; width: 10px; height: 10px; pointer-events: none;
  }
  .ref-btn-blue .ref-btn-corner { border-color: rgba(74,144,217,0.8); }
  .ref-btn-gold .ref-btn-corner { border-color: rgba(184,150,42,0.9); }
  .ref-btn-corner-tl { top: -1px; left: -1px; border-top: 2px solid; border-left: 2px solid; border-radius: 2px 0 0 0; }
  .ref-btn-corner-tr { top: -1px; right: -1px; border-top: 2px solid; border-right: 2px solid; border-radius: 0 2px 0 0; }
  .ref-btn-corner-bl { bottom: -1px; left: -1px; border-bottom: 2px solid; border-left: 2px solid; border-radius: 0 0 0 2px; }
  .ref-btn-corner-br { bottom: -1px; right: -1px; border-bottom: 2px solid; border-right: 2px solid; border-radius: 0 0 2px 0; }

  /* ─── TOPBAR OVERRIDE for reference layout ─── */
  .topbar { justify-content: flex-end; }

  /* Coming Soon Popup */
  #coming-soon-popup {
    display: none; position: fixed; inset: 0; z-index: 9999;
    align-items: center; justify-content: center;
    background: rgba(4,10,28,0.75); backdrop-filter: blur(6px);
  }


  /* ─── SIDEBAR ─── */
  .sidebar {
    width: 178px;
    background: linear-gradient(180deg,
      rgba(5,11,28,0.99) 0%,
      rgba(8,16,38,0.98) 40%,
      rgba(6,13,32,0.99) 100%
    );
    border-right: 1px solid rgba(232,201,106,0.22);
    flex-shrink: 0;
    display: flex; flex-direction: column;
    position: relative;
    overflow: hidden;
  }
  .sidebar::before {
    content: '';
    position: absolute; top: 0; right: 0;
    width: 1px; height: 100%;
    background: linear-gradient(180deg,
      transparent 0%,
      rgba(232,201,106,0.6) 20%,
      rgba(232,201,106,0.6) 80%,
      transparent 100%
    );
    box-shadow: 0 0 8px rgba(232,201,106,0.15);
    z-index: 10;
  }
  .sidebar::after {
    content: '';
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    background: radial-gradient(ellipse 60% 30% at 50% 50%, rgba(74,144,217,0.04) 0%, transparent 70%);
    pointer-events: none;
  }
  .sidebar-profile {
    display: flex; align-items: center; gap: 8px;
    padding: 14px 12px 12px 14px;
    border-bottom: none;
    flex-shrink: 0;
    position: relative;
  }
  .sidebar-profile::after {
    content: '';
    position: absolute; bottom: 0; left: 14px; right: 14px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(232,201,106,0.35), transparent);
  }
  .sidebar-profile .profile-avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #4a7ab5, #1a3060);
    border: 1.5px solid rgba(232,201,106,0.7);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    box-shadow: 0 0 10px rgba(106,180,255,0.35), 0 0 20px rgba(106,180,255,0.1);
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
  }
  .sidebar-profile .profile-name {
    font-family: 'Cinzel', serif;
    font-size: 10.5px; font-weight: 700;
    color: var(--gold-light);
    letter-spacing: 0.5px;
    line-height: 1.2;
  }
  .sidebar-profile .profile-level {
    font-size: 9.5px;
    color: rgba(200,216,238,0.65);
    display: flex; align-items: center; gap: 4px;
    margin-top: 3px;
  }
  .sidebar-profile .xp-bar {
    width: 44px; height: 2px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px; overflow: hidden;
    display: inline-block; vertical-align: middle;
  }
  .sidebar-profile .xp-fill {
    height: 100%; width: 67%;
    background: linear-gradient(90deg, var(--gold-dark), var(--gold));
    border-radius: 2px;
    box-shadow: 0 0 4px rgba(232,201,106,0.5);
  }
  .sidebar-nav {
    flex: 1;
    padding: 6px 0 4px;
    display: flex; flex-direction: column; gap: 0;
  }
  .nav-divider {
    display: flex; align-items: center;
    padding: 8px 12px 6px;
    gap: 6px;
    flex-shrink: 0;
  }
  .nav-divider::before,
  .nav-divider::after {
    content: '';
    flex: 1; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(232,201,106,0.28), transparent);
  }
  .nav-divider-gem {
    width: 5px; height: 5px;
    background: rgba(232,201,106,0.6);
    transform: rotate(45deg);
    flex-shrink: 0;
    box-shadow: 0 0 6px rgba(232,201,106,0.4);
  }
  .nav-item {
    display: flex; align-items: center; gap: 9px;
    padding: 7px 10px 7px 14px;
    cursor: pointer;
    position: relative;
    transition: all 0.18s ease;
    margin: 1px 6px 1px 0;
    border-radius: 0 6px 6px 0;
    border: 1px solid transparent;
    border-left: none;
    background: transparent;
  }
  .nav-item:hover {
    background: rgba(232,201,106,0.06);
    border-color: rgba(232,201,106,0.1);
    border-left: none;
  }
  .nav-item.active {
    background: linear-gradient(90deg, rgba(74,144,217,0.14) 0%, rgba(74,144,217,0.06) 100%);
    border-color: rgba(232,201,106,0.18);
    border-left: none;
    box-shadow: inset 0 0 12px rgba(74,144,217,0.08);
  }
  .nav-item.active::before {
    content: '';
    position: absolute; left: 0; top: 50%;
    transform: translateY(-50%);
    width: 2.5px; height: 55%;
    background: linear-gradient(180deg, rgba(232,201,106,0.4), var(--gold), rgba(232,201,106,0.4));
    border-radius: 0 2px 2px 0;
    box-shadow: 0 0 8px rgba(232,201,106,0.7), 0 0 16px rgba(232,201,106,0.3);
  }
  .nav-icon {
    width: 24px; height: 24px;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    background: transparent;
    flex-shrink: 0;
    overflow: hidden;
    transition: all 0.18s;
  }
  .nav-icon img {
    width: 18px; height: 18px;
    object-fit: contain;
    filter: brightness(0.55) saturate(0.6);
    transition: filter 0.18s;
  }
  .nav-item:hover .nav-icon img {
    filter: brightness(0.8) saturate(0.8);
  }
  .nav-item.active .nav-icon {
    background: rgba(232,201,106,0.1);
  }
  .nav-item.active .nav-icon img {
    filter: brightness(1) saturate(1.2) drop-shadow(0 0 5px rgba(232,201,106,0.7));
  }
  .nav-label {
    font-family: 'Cinzel', serif;
    font-size: 10.5px; font-weight: 600;

<script>
  // Summon counter
  let totalSummons = 0;
  let pityCounter = 0;

  function doSummon(count) {
    totalSummons += count;
    pityCounter += count;
    if (pityCounter >= 80) pityCounter = 0; // reset on guaranteed

    // Flash the button area
    const btns = document.querySelectorAll('.ref-summon-btn');
    btns.forEach(btn => {
      btn.style.filter = 'brightness(1.4)';
      setTimeout(() => { btn.style.filter = ''; }, 300);
    });

    // Update pity bar
    const pct = Math.min((pityCounter / 80) * 100, 100);
    const bar = document.getElementById('pity-bar');
    const display = document.getElementById('pity-display');
    if (bar) bar.style.width = pct + '%';
    if (display) display.textContent = pityCounter + ' / 80';
  }
</script>
