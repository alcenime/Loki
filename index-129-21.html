<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=750, initial-scale=1.0">
<title>Wolf Hunter - Home</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,400&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #e8c96a;
    --gold-light: #f5dfa0;
    --gold-dark: #b8962a;
    --blue-deep: #0a1628;
    --blue-mid: #112240;
    --blue-bright: #1e4080;
    --blue-sky: #4a90d9;
    --blue-glow: #6ab4ff;
    --silver: #c8d8ee;
    --white: #f0f4ff;
    --red-alert: #e84040;
    --purple-gem: #7b5ea7;
    --gem-blue: #4a9eff;
    --panel-bg: rgba(10, 22, 50, 0.85);
    --panel-border: rgba(232, 201, 106, 0.3);
    --sidebar-w: 200px;
    --topbar-h: 64px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 100vw;
    height: 750px;
    overflow: hidden;
    background: #0a1628 url('assets/dashboard/backgroundloki.png') center center / cover no-repeat;
    font-family: 'Rajdhani', sans-serif;
    color: var(--white);
    position: relative;
  }



  /* ─── LAYOUT ─── */
  .wrapper {
    position: relative; z-index: 2;
    width: 100%; height: 750px;
    display: flex; flex-direction: row;
  }

  .center-col {
    flex: 1; display: flex; flex-direction: column;
    overflow: hidden; min-width: 0;
  }

  /* ─── TOPBAR ─── */
  .topbar {
    height: var(--topbar-h);
    background: linear-gradient(180deg, rgba(5,12,30,0.95) 0%, rgba(10,22,50,0.85) 100%);
    border-bottom: 1px solid rgba(232,201,106,0.25);
    display: flex; align-items: center;
    padding: 0 12px; gap: 8px;
    flex-shrink: 0;
    backdrop-filter: blur(6px);
  }

  .profile-avatar {
    width: 48px; height: 48px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #4a7ab5, #1a3060);
    border: 2px solid var(--gold);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    box-shadow: 0 0 12px rgba(106,180,255,0.4);
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
  }

  .profile-info { flex-shrink: 0; }
  .profile-name {
    font-family: 'Cinzel', serif;
    font-size: 13px; font-weight: 700;
    color: var(--gold-light);
    letter-spacing: 0.5px;
    line-height: 1.1;
  }
  .profile-level {
    font-size: 11px; color: var(--silver);
    display: flex; align-items: center; gap: 4px;
  }
  .xp-bar {
    width: 80px; height: 3px;
    background: rgba(255,255,255,0.15);
    border-radius: 2px; overflow: hidden;
    display: inline-block; vertical-align: middle;
  }
  .xp-fill {
    height: 100%; width: 67%;
    background: linear-gradient(90deg, var(--gold-dark), var(--gold));
    border-radius: 2px;
  }

  .compass-icon {
    width: 28px; height: 28px;
    margin: 0 6px;
    opacity: 0.7;
    flex-shrink: 0;
  }

  .top-spacer { flex: 1; }

  .currency-group {
    display: flex; align-items: center; gap: 6px;
  }

  .currency-pill {
    display: flex; align-items: center; gap: 6px;
    background: rgba(5,12,30,0.7);
    border: 1px solid rgba(232,201,106,0.25);
    border-radius: 20px;
    padding: 6px 12px 6px 10px;
    font-size: 14px; font-weight: 600;
    color: var(--white);
  }
  .currency-pill .icon { font-size: 18px; }
  .currency-pill .plus-btn {
    width: 20px; height: 20px;
    border-radius: 50%;
    background: var(--gold);
    color: var(--blue-deep);
    font-size: 13px; font-weight: 900;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0;
    margin-left: 2px;
  }

  .energy-pill {
    display: flex; align-items: center; gap: 6px;
    background: rgba(5,12,30,0.7);
    border: 1px solid rgba(106,180,255,0.3);
    border-radius: 20px;
    padding: 6px 12px 6px 10px;
    font-size: 14px; font-weight: 600;
  }
  .energy-icon { color: #a060ff; font-size: 18px; }

  .top-actions {
    display: flex; align-items: center; gap: 6px;
    margin-left: 4px;
  }
  .top-action-btn {
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; cursor: pointer;
    opacity: 0.8;
    position: relative;
  }
  .notif-badge {
    position: absolute; top: -2px; right: -2px;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--red-alert);
    border: 1px solid var(--blue-deep);
    font-size: 7px; display: flex; align-items: center; justify-content: center;
    font-weight: 700; color: white;
  }

  /* ─── BODY ─── */
  .body-row {
    flex: 1; overflow: hidden;
    display: flex;
  }

  /* ═══════════════════════════════════════════
     SIDEBAR — Premium Fantasy RPG Redesign
     ═══════════════════════════════════════════ */

  /* ─── SIDEBAR SHELL ─── */
  .sidebar {
    width: 178px;
    background: linear-gradient(180deg,
      rgba(5,11,28,0.99) 0%,
      rgba(8,16,38,0.98) 40%,
      rgba(6,13,32,0.99) 100%
    );
    border-right: 1px solid rgba(232,201,106,0.22);
    flex-shrink: 0;
    display: flex; flex-direction: column;
    position: relative;
    overflow: hidden;
  }

  /* Soft gold edge glow on right */
  .sidebar::before {
    content: '';
    position: absolute; top: 0; right: 0;
    width: 1px; height: 100%;
    background: linear-gradient(180deg,
      transparent 0%,
      rgba(232,201,106,0.6) 20%,
      rgba(232,201,106,0.6) 80%,
      transparent 100%
    );
    box-shadow: 0 0 8px rgba(232,201,106,0.15);
    z-index: 10;
  }

  /* Subtle inner light column */
  .sidebar::after {
    content: '';
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    background: radial-gradient(ellipse 60% 30% at 50% 50%, rgba(74,144,217,0.04) 0%, transparent 70%);
    pointer-events: none;
  }

  /* ─── PROFILE SECTION ─── */
  .sidebar-profile {
    display: flex; align-items: center; gap: 8px;
    padding: 14px 12px 12px 14px;
    border-bottom: none;
    flex-shrink: 0;
    position: relative;
  }
  .sidebar-profile::after {
    content: '';
    position: absolute; bottom: 0; left: 14px; right: 14px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(232,201,106,0.35), transparent);
  }

  .sidebar-profile .profile-avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #4a7ab5, #1a3060);
    border: 1.5px solid rgba(232,201,106,0.7);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    box-shadow: 0 0 10px rgba(106,180,255,0.35), 0 0 20px rgba(106,180,255,0.1);
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
  }

  .sidebar-profile .profile-name {
    font-family: 'Cinzel', serif;
    font-size: 10.5px; font-weight: 700;
    color: var(--gold-light);
    letter-spacing: 0.5px;
    line-height: 1.2;
  }
  .sidebar-profile .profile-level {
    font-size: 9.5px;
    color: rgba(200,216,238,0.65);
    display: flex; align-items: center; gap: 4px;
    margin-top: 3px;
  }
  .sidebar-profile .xp-bar {
    width: 44px; height: 2px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px; overflow: hidden;
    display: inline-block; vertical-align: middle;
  }
  .sidebar-profile .xp-fill {
    height: 100%; width: 67%;
    background: linear-gradient(90deg, var(--gold-dark), var(--gold));
    border-radius: 2px;
    box-shadow: 0 0 4px rgba(232,201,106,0.5);
  }

  /* ─── SIDEBAR NAV ─── */
  .sidebar-nav {
    flex: 1;
    padding: 6px 0 4px;
    display: flex; flex-direction: column; gap: 0;
  }

  /* ─── DIVIDER ─── */
  .nav-divider {
    display: flex; align-items: center;
    padding: 8px 12px 6px;
    gap: 6px;
    flex-shrink: 0;
  }
  .nav-divider::before,
  .nav-divider::after {
    content: '';
    flex: 1; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(232,201,106,0.28), transparent);
  }
  .nav-divider-gem {
    width: 5px; height: 5px;
    background: rgba(232,201,106,0.6);
    transform: rotate(45deg);
    flex-shrink: 0;
    box-shadow: 0 0 6px rgba(232,201,106,0.4);
  }

  /* ─── NAV ITEM ─── */
  .nav-item {
    display: flex; align-items: center; gap: 9px;
    padding: 7px 10px 7px 14px;
    cursor: pointer;
    position: relative;
    transition: all 0.18s ease;
    margin: 1px 6px 1px 0;
    border-radius: 0 6px 6px 0;
    border: 1px solid transparent;
    border-left: none;
  }

  /* Inactive state */
  .nav-item {
    background: transparent;
  }
  .nav-item:hover {
    background: rgba(232,201,106,0.06);
    border-color: rgba(232,201,106,0.1);
    border-left: none;
  }

  /* Active state */
  .nav-item.active {
    background: linear-gradient(90deg, rgba(74,144,217,0.14) 0%, rgba(74,144,217,0.06) 100%);
    border-color: rgba(232,201,106,0.18);
    border-left: none;
    box-shadow: inset 0 0 12px rgba(74,144,217,0.08);
  }

  /* Active gold left bar */
  .nav-item.active::before {
    content: '';
    position: absolute; left: 0; top: 50%;
    transform: translateY(-50%);
    width: 2.5px; height: 55%;
    background: linear-gradient(180deg, rgba(232,201,106,0.4), var(--gold), rgba(232,201,106,0.4));
    border-radius: 0 2px 2px 0;
    box-shadow: 0 0 8px rgba(232,201,106,0.7), 0 0 16px rgba(232,201,106,0.3);
  }

  /* ─── NAV ICON ─── */
  .nav-icon {
    width: 24px; height: 24px;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    background: transparent;
    flex-shrink: 0;
    overflow: hidden;
    transition: all 0.18s;
  }
  .nav-icon img {
    width: 18px; height: 18px;
    object-fit: contain;
    filter: brightness(0.55) saturate(0.6);
    transition: filter 0.18s;
  }
  .nav-item:hover .nav-icon img {
    filter: brightness(0.8) saturate(0.8);
  }
  .nav-item.active .nav-icon {
    background: rgba(232,201,106,0.1);
  }
  .nav-item.active .nav-icon img {
    filter: brightness(1) saturate(1.2) drop-shadow(0 0 5px rgba(232,201,106,0.7));
  }

  /* ─── NAV LABEL ─── */
  .nav-label {
    font-family: 'Cinzel', serif;
    font-size: 10.5px; font-weight: 600;
    color: rgba(200,216,238,0.45);
    letter-spacing: 0.5px;
    transition: color 0.18s;
  }
  .nav-item:hover .nav-label {
    color: rgba(200,216,238,0.7);
  }
  .nav-item.active .nav-label {
    color: var(--gold-light);
    text-shadow: 0 0 12px rgba(232,201,106,0.4);
  }

  /* ─── NAV BADGE ─── */
  .nav-badge {
    margin-left: auto;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--red-alert);
    font-size: 8px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    color: white;
    box-shadow: 0 0 6px rgba(232,64,64,0.5);
  }

  .lock-icon {
    margin-left: auto;
    font-size: 10px;
    opacity: 0.3;
  }
  .nav-item.locked .nav-label { color: rgba(180,200,220,0.25); }
  .nav-item.locked .nav-icon { opacity: 0.3; }

  /* ─── WOLF / LOKI LOGO ─── */
  .sidebar-portrait {
    width: 100%;
    padding: 8px 10px 12px;
    border-top: none;
    position: relative;
    flex-shrink: 0;
  }
  .sidebar-portrait::before {
    content: '';
    position: absolute; top: 0; left: 14px; right: 14px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(232,201,106,0.25), transparent);
  }
  .wolf-medallion {
    width: 100px; height: 100px;
    margin: 0 auto;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  /* Soft circular glow behind logo */
  .wolf-medallion::before {
    content: '';
    position: absolute; inset: -10px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(232,201,106,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  .wolf-medallion::after { display: none; }

  /* Dividers (old style, keep for any legacy use) */
  .divider {
    width: 100%; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(232,201,106,0.2), transparent);
    margin: 2px 0;
  }
  .main-content {
    flex: 1;
    display: flex; flex-direction: column;
    gap: 6px;
    padding: 8px 8px 8px;
    overflow: hidden;
  }

  /* Each row in the content area */
  .content-row {
    display: flex; gap: 6px;
    min-height: 0;
  }
  .content-row.row-hero { flex: 2.2; }
  .content-row.row-events { flex: 1.6; }
  .content-row.row-eclipse { flex: 1.4; }

  /* Full-width banners (row 1 & 3) */
  .quest-banner {
    flex: 1;
    border-radius: 10px;
    border: 1px solid rgba(232,201,106,0.3);
    background: linear-gradient(135deg,
      rgba(10,22,50,0.9) 0%,
      rgba(20,40,90,0.85) 50%,
      rgba(10,22,50,0.9) 100%
    );
    overflow: hidden;
    position: relative;
    flex-shrink: 0;
  }

  /* Row 2 main card (left, big) */
  .row-main-card {
    flex: 1;
    border-radius: 8px;
    border: 1px solid rgba(232,201,106,0.25);
    overflow: hidden;
    position: relative;
    cursor: pointer;
    transition: border-color 0.2s;
    min-height: 0;
  }
  .row-main-card:hover { border-color: rgba(232,201,106,0.5); }

  /* Row 2 side stack (right, 3 cards stacked) */
  .row-side-stack {
    width: 150px;
    display: flex; flex-direction: column; gap: 5px;
    flex-shrink: 0;
  }
  .event-side-card {
    flex: 1;
    border-radius: 7px;
    border: 1px solid rgba(232,201,106,0.2);
    cursor: pointer;
    transition: border-color 0.2s;
    position: relative;
    overflow: hidden;
    min-height: 0;
  }
  .event-side-card:hover { border-color: rgba(232,201,106,0.5); }
  .event-side-card img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }

  /* Eclipse banner (row 3) */
  .eclipse-banner {
    flex: 1;
    border-radius: 10px;
    border: 1px solid rgba(120,50,200,0.5);
    overflow: hidden;
    position: relative;
    cursor: pointer;
    display: flex; align-items: stretch;
  }
  .eclipse-bg {
    position: absolute; inset: 0;
    background: linear-gradient(135deg, #0a0820 0%, #1a0840 40%, #0d0520 100%);
  }
  .eclipse-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(90deg,
      rgba(8,4,24,0.85) 0%,
      rgba(8,4,24,0.3) 50%,
      transparent 100%
    );
    z-index: 2;
  }
  .eclipse-content {
    position: relative; z-index: 3;
    padding: 10px 14px;
    display: flex; flex-direction: column; justify-content: center;
    flex-shrink: 0;
  }
  .eclipse-label {
    font-family: 'Cinzel', serif;
    font-size: 9px; font-weight: 600;
    color: rgba(200,160,255,0.7);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 2px;
  }
  .eclipse-title {
    font-family: 'Cinzel', serif;
    font-size: 20px; font-weight: 900;
    color: var(--white);
    letter-spacing: 0.5px;
    text-shadow: 0 0 20px rgba(140,80,255,0.6), 0 2px 8px rgba(0,0,0,0.8);
    line-height: 1.1;
  }
  .eclipse-sub {
    font-family: 'Cinzel', serif;
    font-size: 9px; font-weight: 600;
    color: #e8a030;
    letter-spacing: 0.5px;
    margin-top: 3px;
    text-transform: uppercase;
  }
  .eclipse-desc {
    font-size: 11px; color: rgba(180,200,240,0.8);
    margin-top: 6px;
    font-family: 'Crimson Pro', serif;
    font-style: italic;
    line-height: 1.4;
    max-width: 180px;
  }
  .eclipse-cta {
    position: absolute; bottom: 10px; right: 12px;
    z-index: 3;
  }
  .eclipse-btn {
    padding: 7px 18px;
    background: linear-gradient(135deg, #6020b0, #9040e0);
    border: 1px solid rgba(160,80,255,0.5);
    border-radius: 6px;
    font-family: 'Cinzel', serif;
    font-size: 11px; font-weight: 700;
    color: white; cursor: pointer;
    letter-spacing: 0.5px;
    box-shadow: 0 2px 12px rgba(100,40,200,0.5);
    transition: all 0.2s;
  }
  .eclipse-btn:hover {
    background: linear-gradient(135deg, #7030c0, #a050f0);
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(120,60,220,0.6);
  }

  /* Sky bg inside banner */
  .banner-sky {
    position: absolute; inset: 0;
    background: url('assets/dashboard/hunterpath.png') center top / cover no-repeat;
  }

  /* Mountains silhouette */
  .banner-mountains {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 70px;
  }
  .mountain-1 {
    position: absolute; bottom: 0;
    width: 0; height: 0;
    border-left: 90px solid transparent;
    border-right: 90px solid transparent;
    border-bottom: 80px solid rgba(30,64,130,0.7);
    left: 30px;
  }
  .mountain-2 {
    position: absolute; bottom: 0;
    width: 0; height: 0;
    border-left: 75px solid transparent;
    border-right: 75px solid transparent;
    border-bottom: 65px solid rgba(20,48,100,0.8);
    left: 100px;
  }
  .mountain-3 {
    position: absolute; bottom: 0;
    width: 0; height: 0;
    border-left: 110px solid transparent;
    border-right: 110px solid transparent;
    border-bottom: 90px solid rgba(25,54,115,0.75);
    right: 60px;
  }
  .mountain-4 {
    position: absolute; bottom: 0;
    width: 0; height: 0;
    border-left: 70px solid transparent;
    border-right: 70px solid transparent;
    border-bottom: 60px solid rgba(15,38,85,0.85);
    right: 20px;
  }

  /* Castle silhouette */
  .castle {
    position: absolute; bottom: 30px; right: 80px;
    width: 60px; height: 70px;
    background: rgba(180,210,240,0.25);
    clip-path: polygon(10% 100%, 10% 40%, 0% 40%, 15% 20%, 15% 0%, 25% 0%, 25% 20%, 50% 0%, 75% 20%, 75% 0%, 85% 0%, 85% 20%, 100% 40%, 90% 40%, 90% 100%);
    filter: blur(1px);
  }

  /* Hunter character */
  .banner-character {
    position: absolute;
    bottom: 0; left: 55%;
    transform: translateX(-50%);
    font-size: 80px;
    filter: drop-shadow(0 0 15px rgba(106,180,255,0.5));
    animation: heroFloat 4s ease-in-out infinite;
    z-index: 3;
  }
  @keyframes heroFloat {
    0%, 100% { transform: translateX(-50%) translateY(0px); }
    50% { transform: translateX(-50%) translateY(-6px); }
  }

  /* Wolf companions */
  .wolf-left {
    position: absolute; bottom: 0; left: 15%;
    font-size: 32px;
    filter: drop-shadow(0 2px 8px rgba(106,180,255,0.4));
    animation: wolfIdle 3s ease-in-out infinite;
    animation-delay: 0.5s;
    z-index: 2;
  }
  .wolf-right {
    position: absolute; bottom: 0; right: 12%;
    font-size: 26px;
    filter: drop-shadow(0 2px 8px rgba(106,180,255,0.4));
    animation: wolfIdle 3.5s ease-in-out infinite;
    animation-delay: 1s;
    transform: scaleX(-1);
    z-index: 2;
  }
  @keyframes wolfIdle {
    0%, 100% { transform: scaleX(var(--flip,1)) translateY(0); }
    50% { transform: scaleX(var(--flip,1)) translateY(-4px); }
  }
  .wolf-right { --flip: -1; }

  /* Banner text */
  .banner-text {
    position: absolute; top: 0; left: 0;
    padding: 12px 14px;
    z-index: 4;
  }
  .banner-title {
    font-family: 'Cinzel', serif;
    font-size: 18px; font-weight: 900;
    color: var(--white);
    text-shadow: 0 2px 8px rgba(0,0,0,0.6);
    letter-spacing: 0.5px;
  }
  .banner-subtitle {
    font-family: 'Cinzel', serif;
    font-size: 11px; font-weight: 600;
    color: var(--gold-light);
    margin-top: 1px;
    letter-spacing: 0.3px;
  }
  .banner-desc {
    font-size: 12px; color: rgba(200,220,240,0.9);
    margin-top: 6px; max-width: 200px;
    line-height: 1.4;
    font-family: 'Crimson Pro', serif;
    font-style: italic;
  }

  .banner-info-btn {
    position: absolute; top: 10px; right: 10px;
    width: 24px; height: 24px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    border: 1px solid rgba(255,255,255,0.4);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700;
    color: white; cursor: pointer; z-index: 4;
  }

  /* Progress row */
  .banner-progress {
    position: absolute; bottom: 10px; left: 14px;
    z-index: 4;
    display: flex; flex-direction: column; gap: 4px;
  }
  .progress-bar-row {
    display: flex; align-items: center; gap: 6px;
  }
  .progress-track {
    width: 140px; height: 5px;
    background: rgba(255,255,255,0.2);
    border-radius: 3px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; width: 60%;
    background: linear-gradient(90deg, var(--gold-dark), var(--gold));
    border-radius: 3px;
  }
  .progress-label {
    font-size: 11px; color: var(--gold-light);
    font-weight: 600;
  }
  .continue-btn {
    padding: 7px 20px;
    background: linear-gradient(135deg, #2a5ab5, #4a7ae0);
    border: 1px solid rgba(106,180,255,0.5);
    border-radius: 6px;
    font-family: 'Cinzel', serif;
    font-size: 12px; font-weight: 700;
    color: white; cursor: pointer;
    letter-spacing: 0.5px;
    box-shadow: 0 2px 10px rgba(74,122,224,0.4);
    transition: all 0.2s;
    width: fit-content;
  }
  .continue-btn:hover {
    background: linear-gradient(135deg, #3a6ac5, #5a8af0);
    transform: translateY(-1px);
    box-shadow: 0 4px 14px rgba(74,122,224,0.5);
  }

  /* ─── BOTTOM BAR (removed) ─── */

  .event-wolf-art {
    position: absolute; right: -10px; top: -5px;
    font-size: 90px;
    filter:
      drop-shadow(-5px 0 15px rgba(74,158,255,0.6))
      drop-shadow(0 0 30px rgba(100,180,255,0.3));
    opacity: 0.85;
    animation: wolfGlow 3s ease-in-out infinite;
  }
  @keyframes wolfGlow {
    0%, 100% { filter: drop-shadow(-5px 0 15px rgba(74,158,255,0.6)) drop-shadow(0 0 30px rgba(100,180,255,0.3)); }
    50% { filter: drop-shadow(-5px 0 20px rgba(74,158,255,0.9)) drop-shadow(0 0 40px rgba(140,200,255,0.5)); }
  }

  /* Lightning particles */
  .lightning-particle {
    position: absolute;
    width: 2px;
    background: linear-gradient(180deg, transparent, #6ab4ff, transparent);
    border-radius: 1px;
    animation: lightningFlash 2s ease-in-out infinite;
    opacity: 0;
  }
  .lp1 { height: 40px; right: 55px; top: 10px; animation-delay: 0s; }
  .lp2 { height: 60px; right: 80px; top: 20px; animation-delay: 0.7s; }
  .lp3 { height: 30px; right: 40px; top: 40px; animation-delay: 1.4s; }
  @keyframes lightningFlash {
    0%, 100% { opacity: 0; }
    50% { opacity: 0.7; }
  }

  .event-content {
    position: relative; z-index: 2;
    padding: 10px 12px;
  }
  .event-name {
    font-family: 'Cinzel', serif;
    font-size: 16px; font-weight: 800;
    color: #60b0ff;
    text-shadow: 0 0 15px rgba(74,158,255,0.5);
    letter-spacing: 0.3px;
  }
  .event-timer {
    display: flex; align-items: center; gap: 4px;
    font-size: 11px; color: #e8a030;
    margin-top: 3px; font-weight: 600;
  }
  .event-desc {
    font-size: 11px; color: rgba(180,210,240,0.85);
    margin-top: 6px; line-height: 1.4;
    font-family: 'Crimson Pro', serif;
    max-width: 160px;
  }

  /* Reward icons row */
  .reward-row {
    display: flex; gap: 4px;
    margin-top: 8px;
    position: absolute; bottom: 10px; left: 12px; z-index: 2;
  }
  .reward-box {
    width: 38px; height: 38px;
    border-radius: 6px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(232,201,106,0.3);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    position: relative;
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .reward-box:hover { border-color: var(--gold); }
  .reward-count {
    position: absolute; bottom: 1px; right: 2px;
    font-size: 8px; font-weight: 700;
    color: var(--gold-light);
  }

  /* event-main-bg used in row-main-card */
  .event-main-bg {
    position: absolute; inset: 0;
    background: linear-gradient(135deg, #0a2050 0%, #1a4090 40%, #0a3070 70%);
  }

  /* ─── DIVIDERS ─── */

  /* ─── RIGHT PANEL - Portrait Style ─── */
  .char-panel {
    width: 185px;
    background: rgba(6,14,36,0.97);
    border-left: 1px solid rgba(232,201,106,0.2);
    flex-shrink: 0;
    display: flex; flex-direction: column;
    overflow: hidden;
    position: relative;
    padding: 0;
    gap: 0;
  }

  /* Portrait card */
  .portrait-card {
    flex: 1;
    border-radius: 8px;
    border: 1.5px solid rgba(232,201,106,0.35);
    position: relative;
    overflow: hidden;
    cursor: pointer;
    min-height: 0;
    background: linear-gradient(135deg, rgba(10,22,52,0.95), rgba(20,38,80,0.9));
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .portrait-card:hover {
    border-color: rgba(232,201,106,0.7);
    box-shadow: 0 0 12px rgba(232,201,106,0.2);
  }

  /* Top gold line on each card */
  .portrait-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(232,201,106,0.6), transparent);
    z-index: 3;
  }

  /* The actual character image */
  .portrait-img {
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: center top;
    display: block;
    position: absolute; inset: 0;
  }

  /* Placeholder bg (before image loaded) */
  .portrait-ph {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .portrait-ph.ph-blue   { background: radial-gradient(circle at 40% 30%, #2a5a9a, #0e2050, #060e28); }
  .portrait-ph.ph-purple { background: radial-gradient(circle at 40% 30%, #4a2870, #1e0e40, #080418); }
  .portrait-ph.ph-gold   { background: radial-gradient(circle at 40% 30%, #8a6020, #3a2808, #120e04); }
  .portrait-ph.ph-green  { background: radial-gradient(circle at 40% 30%, #1a6040, #082818, #020c08); }

  /* Element icon top-left */
  .portrait-elem {
    position: absolute; top: 7px; left: 7px;
    width: 24px; height: 24px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    z-index: 4;
    backdrop-filter: blur(4px);
  }
  .portrait-elem.elem-moon   { background: rgba(20,40,100,0.7); border: 1px solid rgba(74,144,217,0.5); }
  .portrait-elem.elem-shadow { background: rgba(40,15,80,0.7);  border: 1px solid rgba(140,60,220,0.5); }
  .portrait-elem.elem-light  { background: rgba(60,44,10,0.7);  border: 1px solid rgba(220,180,60,0.5); }
  .portrait-elem.elem-star   { background: rgba(20,30,60,0.7);  border: 1px solid rgba(180,210,255,0.5); }

  /* Name overlay at bottom */
  .portrait-name {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 18px 8px 7px;
    background: linear-gradient(0deg, rgba(4,10,28,0.92) 0%, transparent 100%);
    font-family: 'Cinzel', serif;
    font-size: 12px; font-weight: 700;
    color: var(--white);
    letter-spacing: 0.4px;
    text-align: right;
    z-index: 4;
  }

  /* Dividers */
  .divider {
    width: 100%; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(232,201,106,0.2), transparent);
    margin: 2px 0;
  }

  /* Floating gold particles */
  .gold-particle {
    position: absolute;
    width: 3px; height: 3px;
    border-radius: 50%;
    background: var(--gold);
    animation: goldFloat linear infinite;
    opacity: 0;
    pointer-events: none;
    z-index: 1;
  }
  @keyframes goldFloat {
    0% { opacity: 0; transform: translateY(0) rotate(0deg); }
    15% { opacity: 0.8; }
    85% { opacity: 0.3; }
    100% { opacity: 0; transform: translateY(-120px) rotate(360deg); }
  }

  /* ─── CONNECT WALLET ─── */
  .connect-wallet-btn {
    display: flex; align-items: center; justify-content: center; gap: 7px;
    padding: 7px 12px;
    width: 100%;
    background: linear-gradient(135deg, rgba(18,36,80,0.95), rgba(26,52,110,0.9));
    border: 1px solid rgba(232,201,106,0.5);
    border-radius: 20px;
    cursor: pointer;
    font-family: 'Cinzel', serif;
    font-size: 10px; font-weight: 700;
    color: var(--gold-light);
    letter-spacing: 0.4px;
    transition: all 0.2s;
    box-shadow: 0 0 12px rgba(232,201,106,0.1), inset 0 1px 0 rgba(232,201,106,0.1);
    white-space: nowrap;
  }
  .connect-wallet-btn:hover {
    border-color: var(--gold);
    box-shadow: 0 0 18px rgba(232,201,106,0.25), inset 0 1px 0 rgba(232,201,106,0.15);
    background: linear-gradient(135deg, rgba(24,46,100,0.98), rgba(34,64,130,0.95));
  }
  .connect-wallet-btn.connected {
    border-color: rgba(74,200,120,0.6);
    color: #7de8a8;
    background: linear-gradient(135deg, rgba(8,28,18,0.95), rgba(14,44,28,0.9));
    box-shadow: 0 0 14px rgba(74,200,120,0.15);
  }
  .connect-wallet-btn.connected .wallet-label::before { content: ''; }
  .connect-wallet-btn.connected .wallet-label { }
  .connect-wallet-btn.connected::after { content: ' 0x3f...a7c2'; font-size: 10px; opacity: 0.7; }
  .wallet-icon {
    font-size: 14px;
    color: var(--gold);
    line-height: 1;
  }
  .connect-wallet-btn.connected .wallet-icon { color: #7de8a8; }

  /* ─── RIGHT PANEL overrides ─── */
  .char-panel {
    background: rgba(6,14,36,0.97);
    padding: 6px 6px;
    gap: 5px;
    width: 185px;
  }
  .char-panel-header {
    height: var(--topbar-h);
    display: flex; align-items: center; justify-content: center;
    padding: 0 8px;
    background: linear-gradient(180deg, rgba(5,12,30,0.95) 0%, rgba(10,22,50,0.85) 100%);
    border-bottom: 1px solid rgba(232,201,106,0.25);
    flex-shrink: 0;
    /* header sejajar topbar, tidak ikut dalam padding area */
    margin: -6px -6px 0 -6px;
    width: calc(100% + 12px);
  }
  /* 4 portrait cards dengan gap & rounded, mulai tepat setelah header */
  .char-panel .portrait-card {
    border-radius: 8px;
    border: 1.5px solid rgba(232,201,106,0.3);
    flex: 1;
  }
  .char-panel .portrait-card:hover {
    border-color: rgba(232,201,106,0.65);
  }

  /* diamond gem top-center on each card */
  .portrait-gem {
    position: absolute; top: -1px; left: 50%; transform: translateX(-50%);
    width: 8px; height: 8px;
    background: var(--gold);
    clip-path: polygon(50% 0%,100% 50%,50% 100%,0% 50%);
    z-index: 5;
    box-shadow: 0 0 6px rgba(232,201,106,0.8);
  }

  .portrait-name {
    padding: 28px 10px 8px;
    font-family: 'Cinzel', serif;
    font-size: 12px; font-weight: 700;
    color: var(--white);
    letter-spacing: 0.8px;
    text-align: right;
    text-transform: uppercase;
    background: linear-gradient(0deg, rgba(4,10,28,0.95) 0%, rgba(4,10,28,0.4) 70%, transparent 100%);
    z-index: 4;
    position: absolute; bottom: 0; left: 0; right: 0;
  }
</style>
</head>

<!-- BUY PAGE (hidden by default, shown inside body-row) -->
<script>
  document.addEventListener('DOMContentLoaded', function() {
    var bodyRow = document.querySelector('.body-row');

    var buyPage = document.createElement('div');
    buyPage.id = 'buy-page';
    buyPage.style.display = 'none';
    buyPage.innerHTML = `
      <div class="shop-frame">
        <!-- Background: buywolf image top, dark bottom -->
        <img class="shop-bg-img" src="assets/buy/buywolf.png" alt="">
        <div class="shop-bg-fade"></div>
        <div class="shop-bg-bottom"></div>

        <div class="shop-content">

          <!-- Buy / Sell tabs -->
          <div class="swap-tabs">
            <div class="swap-tab active" id="tab-buy" onclick="setMode('buy')">Buy</div>
            <div class="swap-tab" id="tab-sell" onclick="setMode('sell')">Sell</div>
          </div>

          <!-- Swap box -->
          <div class="swap-box">
            <!-- FROM -->
            <div class="swap-box-label">FROM</div>
            <div class="swap-row">
              <img class="swap-coin-img" id="from-img" src="assets/buy/wolfcoin.png" alt="">
              <div class="swap-coin-info">
                <div class="swap-coin-name" id="from-name">TOKEN</div>
                <div class="swap-coin-sub" id="from-sub">$LWT Token</div>
              </div>
              <div class="swap-input-wrap">
                <div class="swap-balance" id="from-balance">Balance: 0</div>
                <div class="swap-amount-row">
                  <input class="swap-input" id="swap-from-input" type="text" value="0">
                  <div class="swap-max-btn" id="max-btn" onclick="setMax()">MAX</div>
                </div>
              </div>
            </div>

            <!-- TO -->
            <div class="swap-box-label" style="margin-top:10px;">TO</div>
            <div class="swap-row">
              <img class="swap-coin-img" id="to-img" src="assets/buy/wolfgold.png" alt="">
              <div class="swap-coin-info">
                <div class="swap-coin-name gold" id="to-name">GOLD</div>
                <div class="swap-coin-sub" id="to-sub">In-game Currency</div>
              </div>
              <div class="swap-input-wrap">
                <div class="swap-balance gold" id="to-balance">Balance: 0</div>
                <div class="swap-amount-row">
                  <input class="swap-input" id="swap-to-input" type="text" value="0">
                </div>
              </div>
            </div>
          </div>

          <!-- Rate -->
          <div class="swap-rate" id="swap-rate-label">Coming Soon</div>

          <!-- Swap -->
          <div class="swap-now-btn">SWAP</div>

          <!-- Trust badges -->
          <div class="swap-trust">
            <div class="swap-trust-item">Best rate</div>
            <div class="swap-trust-dot"></div>
            <div class="swap-trust-item">Low fees</div>
            <div class="swap-trust-dot"></div>
            <div class="swap-trust-item">Secure</div>
          </div>

          <!-- Supported by -->
          <div class="supported-label">Supported By</div>
          <div class="shop-launch-btns">
            <div class="launch-btn" onclick="window.open('https://flaunch.gg','_blank')">
              <img src="assets/buy/flaunch.png" alt="" onerror="this.style.display='none'">
            </div>
            <div class="launch-btn" onclick="window.open('https://uniswap.org','_blank')">
              <img src="assets/buy/uniswap.png" alt="" onerror="this.style.display='none'">
            </div>
            <div class="launch-btn" onclick="window.open('https://dexscreener.com','_blank')">
              <img src="assets/buy/dexscreener.png" alt="" onerror="this.style.display='none'">
            </div>
          </div>

          <!-- CA -->
          <div class="shop-ca-box">
            <span class="shop-ca-dash">—</span>
            <span class="shop-ca-text">CA : Coming Soon</span>
            <span class="shop-ca-dash">—</span>
          </div>
        </div>
      </div>
    `;
    bodyRow.appendChild(buyPage);

    // Mode: buy = Token→Gold, sell = Gold→Token
    var RATE_TOKEN_TO_GOLD = 307.02;
    var RATE_GOLD_TO_TOKEN = 0.0032568;
    var currentMode = 'buy';

    window.setMode = function(mode) {
      currentMode = mode;
      document.getElementById('tab-buy').classList.toggle('active', mode === 'buy');
      document.getElementById('tab-sell').classList.toggle('active', mode === 'sell');

      if (mode === 'buy') {
        // FROM = Token, TO = Gold
        document.getElementById('from-img').src = 'assets/buy/wolfcoin.png';
        document.getElementById('from-name').textContent = 'TOKEN';
        document.getElementById('from-name').className = 'swap-coin-name';
        document.getElementById('from-sub').textContent = '$LWT Token';
        document.getElementById('from-balance').textContent = 'Balance: 0';
        document.getElementById('from-balance').className = 'swap-balance';
        document.getElementById('to-img').src = 'assets/buy/wolfgold.png';
        document.getElementById('to-name').textContent = 'GOLD';
        document.getElementById('to-name').className = 'swap-coin-name gold';
        document.getElementById('to-sub').textContent = 'In-game Currency';
        document.getElementById('to-balance').textContent = 'Balance: 0';
        document.getElementById('to-balance').className = 'swap-balance gold';
        document.getElementById('swap-from-input').value = '0';
        document.getElementById('swap-rate-label').innerHTML = 'Coming Soon';
      } else {
        // FROM = Gold, TO = Token
        document.getElementById('from-img').src = 'assets/buy/wolfgold.png';
        document.getElementById('from-name').textContent = 'GOLD';
        document.getElementById('from-name').className = 'swap-coin-name gold';
        document.getElementById('from-sub').textContent = 'In-game Currency';
        document.getElementById('from-balance').textContent = 'Balance: 0';
        document.getElementById('from-balance').className = 'swap-balance gold';
        document.getElementById('to-img').src = 'assets/buy/wolfcoin.png';
        document.getElementById('to-name').textContent = 'TOKEN';
        document.getElementById('to-name').className = 'swap-coin-name';
        document.getElementById('to-sub').textContent = '$LWT Token';
        document.getElementById('to-balance').textContent = 'Balance: 0';
        document.getElementById('to-balance').className = 'swap-balance';
        document.getElementById('swap-from-input').value = '0';
        document.getElementById('swap-rate-label').innerHTML = 'Coming Soon';
      }
      updateSwap();
      document.getElementById('swap-to-input').value = '0';
    };

    window.setMax = function() {
      if (currentMode === 'buy') {
        document.getElementById('swap-from-input').value = '12,540';
      } else {
        document.getElementById('swap-from-input').value = '1,258,760';
      }
      updateSwap();
    };

    // Swap input calc
    window.updateSwap = function() {
      var from = parseFloat(document.getElementById('swap-from-input').value.replace(/,/g,'')) || 0;
      var rate = currentMode === 'buy' ? RATE_TOKEN_TO_GOLD : RATE_GOLD_TO_TOKEN;
      var result = (from * rate).toFixed(2);
      document.getElementById('swap-to-input').value = result == 0 ? '0' : parseFloat(result).toLocaleString();
    };
    window.flipSwap = function() {
      var btn = document.querySelector('.swap-arrow-btn');
      btn.style.transform = 'rotate(180deg)';
      setTimeout(function(){ btn.style.transform = ''; }, 300);
    };
    document.addEventListener('input', function(e) {
      if (e.target.id === 'swap-from-input') {
        updateSwap();
      } else if (e.target.id === 'swap-to-input') {
        // Reverse: user types in TO, calculate FROM
        var to = parseFloat(e.target.value.replace(/,/g,'')) || 0;
        var rate = currentMode === 'buy' ? RATE_TOKEN_TO_GOLD : RATE_GOLD_TO_TOKEN;
        var fromVal = rate > 0 ? (to / rate).toFixed(2) : 0;
        document.getElementById('swap-from-input').value = fromVal == 0 ? '0' : parseFloat(fromVal).toLocaleString();
      }
    });

    // Buy nav click
    document.getElementById('nav-buy').addEventListener('click', function() {
      document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
      this.classList.add('active');
      document.querySelector('.main-content').style.display = 'none';
      document.getElementById('buy-page').style.display = 'flex';
    });

    // Other nav items restore main content
    document.querySelectorAll('.nav-item:not(#nav-buy)').forEach(el => {
      el.addEventListener('click', function() {
        document.querySelectorAll('.nav-item').forEach(e => e.classList.remove('active'));
        this.classList.add('active');
        document.querySelector('.main-content').style.display = 'flex';
        document.getElementById('buy-page').style.display = 'none';
      });
    });
  });
</script>
<script>
  (function() {
    // End: May 29, 2026 23:59:59 local time
    var endTime = new Date('2026-05-29T23:59:59').getTime();
    function pad(n){ return String(n).padStart(2,'0'); }
    function tick() {
      var now = Date.now();
      var diff = endTime - now;
      if (diff <= 0) {
        document.getElementById('mh-d').textContent='00';
        document.getElementById('mh-h').textContent='00';
        document.getElementById('mh-m').textContent='00';
        document.getElementById('mh-s').textContent='00';
        return;
      }
      var d = Math.floor(diff / 86400000);
      var h = Math.floor((diff % 86400000) / 3600000);
      var m = Math.floor((diff % 3600000) / 60000);
      var s = Math.floor((diff % 60000) / 1000);
      document.getElementById('mh-d').textContent = pad(d);
      document.getElementById('mh-h').textContent = pad(h);
      document.getElementById('mh-m').textContent = pad(m);
      document.getElementById('mh-s').textContent = pad(s);
    }
    tick();
    setInterval(tick, 1000);
  })();
</script>
