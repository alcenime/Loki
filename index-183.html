<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=750, initial-scale=1.0">
<title>Wolf Hunter</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 750px;
    height: 750px;
    overflow: hidden;
    background: #0a1628;
    margin: 0 auto;
  }

  .bg {
    position: absolute;
    inset: 0;
    background: url('assets/loading/loadingloki.jpg') center center / cover no-repeat;
  }

  .bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(4,10,24,0.75) 0%, transparent 50%);
  }

  #start-btn {
    position: absolute;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    padding: 16px 64px;
    font-family: 'Cinzel', serif;
    font-size: 16px;
    font-weight: 900;
    letter-spacing: 4px;
    color: #0a1628;
    background: linear-gradient(135deg, #f5dfa0 0%, #e8c96a 50%, #b8962a 100%);
    border: none;
    border-radius: 4px;
    cursor: pointer;
    text-transform: uppercase;
    box-shadow: 0 0 30px rgba(232,201,106,0.5), 0 6px 20px rgba(0,0,0,0.6);
    overflow: hidden;
    animation: pulse 2.5s ease-in-out infinite;
  }
  #start-btn::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 60%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
    transform: skewX(-20deg);
    animation: shimmer 3s ease-in-out 1s infinite;
  }
  @keyframes shimmer {
    0% { left: -100%; }
    60%, 100% { left: 150%; }
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 25px rgba(232,201,106,0.4), 0 6px 20px rgba(0,0,0,0.6); }
    50% { box-shadow: 0 0 50px rgba(232,201,106,0.75), 0 6px 20px rgba(0,0,0,0.6); }
  }
  #start-btn:active { transform: translateX(-50%) scale(0.96); }

  #loading-wrap {
    display: none;
    position: absolute;
    bottom: 70px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    width: 340px;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .bar-track {
    width: 100%;
    height: 5px;
    background: rgba(255,255,255,0.1);
    border-radius: 3px;
    border: 1px solid rgba(232,201,106,0.2);
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #b8962a, #e8c96a, #f5dfa0);
    border-radius: 3px;
    transition: width 0.08s linear;
    box-shadow: 0 0 8px rgba(232,201,106,0.7);
  }

  .pct {
    font-family: 'Cinzel', serif;
    font-size: 20px;
    font-weight: 700;
    color: #f5dfa0;
    text-shadow: 0 0 14px rgba(232,201,106,0.6);
  }
</style>
</head>
<body>

<div class="bg"></div>

<button id="start-btn" onclick="startLoading()">▶ START GAME</button>

<div id="loading-wrap">
  <div class="bar-track"><div class="bar-fill" id="bar"></div></div>
  <div class="pct" id="pct">0%</div>
</div>

<script>
  let progress = 0;
  let audioCtx = null;
  let musicNodes = [];

  // ─── CHORD FANTASY MUSIC (Web Audio API) ───
  function playChordFantasy() {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    const master = audioCtx.createGain();
    master.gain.setValueAtTime(0, audioCtx.currentTime);
    master.gain.linearRampToValueAtTime(0.18, audioCtx.currentTime + 2);
    master.connect(audioCtx.destination);

    // Reverb convolver for atmosphere
    const convolver = audioCtx.createConvolver();
    const reverbBuf = audioCtx.createBuffer(2, audioCtx.sampleRate * 3, audioCtx.sampleRate);
    for (let ch = 0; ch < 2; ch++) {
      const d = reverbBuf.getChannelData(ch);
      for (let i = 0; i < d.length; i++) {
        d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / d.length, 2.5);
      }
    }
    convolver.buffer = reverbBuf;
    const reverbGain = audioCtx.createGain();
    reverbGain.gain.value = 0.35;
    convolver.connect(reverbGain);
    reverbGain.connect(master);

    // Fantasy chord progression: Am - F - C - G (loop)
    // Frequencies for each chord (root, third, fifth, octave)
    const chords = [
      [220, 261.63, 329.63, 440],   // Am
      [174.61, 220, 261.63, 349.23],// F
      [261.63, 329.63, 392, 523.25],// C
      [196, 246.94, 293.66, 392],   // G
    ];

    const chordDuration = 3.0;
    const totalLoop = chordDuration * chords.length;

    function scheduleChords(startTime) {
      chords.forEach((chord, ci) => {
        const chordStart = startTime + ci * chordDuration;

        chord.forEach((freq, ni) => {
          // Main oscillator (sine for warmth)
          const osc = audioCtx.createOscillator();
          const env = audioCtx.createGain();
          osc.type = 'sine';
          osc.frequency.value = freq;

          // Slight detune for richness
          osc.detune.value = (ni % 2 === 0 ? 4 : -4);

          env.gain.setValueAtTime(0, chordStart);
          env.gain.linearRampToValueAtTime(ni === 0 ? 0.22 : 0.12, chordStart + 0.4);
          env.gain.linearRampToValueAtTime(ni === 0 ? 0.18 : 0.09, chordStart + chordDuration - 0.3);
          env.gain.linearRampToValueAtTime(0, chordStart + chordDuration);

          osc.connect(env);
          env.connect(master);
          env.connect(convolver);
          osc.start(chordStart);
          osc.stop(chordStart + chordDuration + 0.1);

          // Second osc one octave up (triangle, soft)
          const osc2 = audioCtx.createOscillator();
          const env2 = audioCtx.createGain();
          osc2.type = 'triangle';
          osc2.frequency.value = freq * 2;
          osc2.detune.value = -3;

          env2.gain.setValueAtTime(0, chordStart);
          env2.gain.linearRampToValueAtTime(0.04, chordStart + 0.6);
          env2.gain.linearRampToValueAtTime(0.03, chordStart + chordDuration - 0.3);
          env2.gain.linearRampToValueAtTime(0, chordStart + chordDuration);

          osc2.connect(env2);
          env2.connect(master);
          env2.connect(convolver);
          osc2.start(chordStart);
          osc2.stop(chordStart + chordDuration + 0.1);
        });

        // Pluck/harp hit on chord start
        const pluck = audioCtx.createOscillator();
        const pluckEnv = audioCtx.createGain();
        pluck.type = 'triangle';
        pluck.frequency.value = chord[0] * 2;
        pluckEnv.gain.setValueAtTime(0.18, chordStart);
        pluckEnv.gain.exponentialRampToValueAtTime(0.001, chordStart + 1.2);
        pluck.connect(pluckEnv);
        pluckEnv.connect(master);
        pluckEnv.connect(convolver);
        pluck.start(chordStart);
        pluck.stop(chordStart + 1.3);
      });
    }

    // Schedule first loop immediately
    scheduleChords(audioCtx.currentTime + 0.1);

    // Loop
    let loopCount = 1;
    const loopInterval = setInterval(() => {
      if (!audioCtx || audioCtx.state === 'closed') {
        clearInterval(loopInterval);
        return;
      }
      scheduleChords(audioCtx.currentTime + 0.05);
      loopCount++;
      if (loopCount > 20) clearInterval(loopInterval);
    }, totalLoop * 1000);

    // Low drone bass
    const drone = audioCtx.createOscillator();
    const droneEnv = audioCtx.createGain();
    drone.type = 'sine';
    drone.frequency.value = 55;
    droneEnv.gain.setValueAtTime(0, audioCtx.currentTime);
    droneEnv.gain.linearRampToValueAtTime(0.12, audioCtx.currentTime + 3);
    drone.connect(droneEnv);
    droneEnv.connect(master);
    drone.start();

    musicNodes = [drone];
    window._droneEnv = droneEnv;
    window._master = master;
  }

  function stopMusic() {
    if (!audioCtx) return;
    if (window._master) {
      window._master.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 1.5);
    }
    setTimeout(() => {
      try { audioCtx.close(); } catch(e) {}
      audioCtx = null;
    }, 1600);
  }

  // ─── START LOADING ───
  let progress = 0;

  function startLoading() {
    playChordFantasy();

    const btn = document.getElementById('start-btn');
    const wrap = document.getElementById('loading-wrap');

    btn.style.transition = 'opacity 0.35s';
    btn.style.opacity = '0';
    btn.style.pointerEvents = 'none';

    setTimeout(() => {
      btn.style.display = 'none';
      wrap.style.display = 'flex';
      tick();
    }, 350);
  }

  function tick() {
    if (progress >= 100) {
      document.getElementById('bar').style.width = '100%';
      document.getElementById('pct').textContent = '100%';
      stopMusic();
      setTimeout(() => { window.location.href = 'game.html'; }, 700);
      return;
    }

    let step;
    if (progress < 30) step = Math.random() * 2.5 + 0.5;
    else if (progress < 70) step = Math.random() * 1.5 + 0.3;
    else step = Math.random() * 0.8 + 0.1;

    const delay = Math.random() < 0.08 ? 350 : 65;
    progress = Math.min(100, progress + step);

    document.getElementById('bar').style.width = progress.toFixed(1) + '%';
    document.getElementById('pct').textContent = Math.floor(progress) + '%';

    setTimeout(tick, delay);
  }
</script>

</body>
</html>
