<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=750, initial-scale=1.0" name="viewport"/>
<title>Wolf Hunter - Quests</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,400&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --gold: #e8c96a;
    --gold-light: #f5dfa0;
    --gold-dark: #b8962a;
    --blue-deep: #0a1628;
    --blue-mid: #112240;
    --blue-bright: #1e4080;
    --blue-sky: #4a90d9;
    --blue-glow: #6ab4ff;
    --silver: #c8d8ee;
    --white: #f0f4ff;
    --red-alert: #e84040;
    --panel-bg: rgba(10,22,50,0.85);
    --panel-border: rgba(232,201,106,0.3);
    --topbar-h: 64px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 100vw;
    height: 750px;
    overflow: hidden;
    background: #0a1628;
    font-family: 'Rajdhani', sans-serif;
    color: var(--white);
    position: relative;
  }

  .wrapper {
    position: relative; z-index: 2;
    width: 100%; height: 750px;
    display: flex; flex-direction: row;
  }

  .center-col {
    flex: 1; display: flex; flex-direction: column;
    overflow: hidden; min-width: 0;
  }

  /* ─── TOPBAR ─── */
  .topbar {
    height: var(--topbar-h);
    background: linear-gradient(180deg, rgba(5,12,30,0.95) 0%, rgba(10,22,50,0.85) 100%);
    border-bottom: 1px solid rgba(232,201,106,0.25);
    display: flex; align-items: center;
    padding: 0 12px; gap: 8px;
    flex-shrink: 0;
    backdrop-filter: blur(6px);
  }
  .top-spacer { flex: 1; }
  .currency-group { display: flex; align-items: center; gap: 6px; }
  .currency-pill {
    display: flex; align-items: center; gap: 4px;
    background: rgba(10,22,50,0.8);
    border: 1px solid rgba(232,201,106,0.25);
    border-radius: 20px;
    padding: 4px 8px 4px 6px;
    font-family: 'Cinzel', serif;
    font-size: 11px; font-weight: 700;
    color: var(--gold-light);
  }
  .currency-pill .plus-btn {
    width: 16px; height: 16px;
    background: var(--gold);
    color: var(--blue-deep);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 900; cursor: pointer;
    margin-left: 2px;
  }
  .energy-pill {
    display: flex; align-items: center; gap: 4px;
    background: rgba(60,20,100,0.5);
    border: 1px solid rgba(160,96,255,0.35);
    border-radius: 20px;
    padding: 4px 8px 4px 6px;
    font-family: 'Cinzel', serif;
    font-size: 11px; font-weight: 700;
    color: #d0a0ff;
  }
  .energy-icon { font-size: 13px; }
  .connect-wallet-btn {
    display: flex; align-items: center; gap: 6px;
    background: linear-gradient(135deg, rgba(30,64,180,0.6), rgba(50,100,220,0.4));
    border: 1px solid rgba(106,180,255,0.4);
    border-radius: 20px;
    padding: 6px 14px;
    font-family: 'Cinzel', serif;
    font-size: 10px; font-weight: 700;
    color: var(--white); cursor: pointer;
    letter-spacing: 0.5px;
    transition: all 0.2s;
  }
  .connect-wallet-btn:hover {
    background: linear-gradient(135deg, rgba(40,80,200,0.8), rgba(60,120,240,0.6));
    border-color: rgba(106,180,255,0.7);
  }

  .body-row { flex: 1; overflow: hidden; display: flex; }

  /* ─── COMING SOON CONTENT ─── */
  .quest-main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    background: linear-gradient(180deg, rgba(5,11,28,0.98) 0%, rgba(8,18,45,0.96) 100%);
  }
  .quest-main::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 70% 50% at 50% 50%, rgba(74,144,217,0.07) 0%, transparent 70%);
    pointer-events: none;
  }
  .quest-main::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(232,201,106,0.3), transparent);
  }
  .coming-soon-wrap {
    text-align: center;
    position: relative; z-index: 1;
    padding: 20px;
  }
  .coming-soon-icon {
    font-size: 48px;
    margin-bottom: 18px;
    opacity: 0.6;
    filter: drop-shadow(0 0 16px rgba(232,201,106,0.4));
  }
  .coming-soon-label {
    font-family: 'Cinzel', serif;
    font-size: 10px; font-weight: 600;
    letter-spacing: 5px;
    color: rgba(232,201,106,0.5);
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .coming-soon-title {
    font-family: 'Cinzel', serif;
    font-size: 32px; font-weight: 900;
    letter-spacing: 3px;
    background: linear-gradient(180deg, #f5dfa0 0%, #e8c96a 50%, #b8962a 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.1;
    margin-bottom: 6px;
  }
  .coming-soon-sub {
    font-family: 'Cinzel', serif;
    font-size: 14px; font-weight: 400;
    color: rgba(232,201,106,0.7);
    letter-spacing: 2px;
    margin-bottom: 20px;
  }
  .coming-soon-divider {
    width: 100px; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(232,201,106,0.45), transparent);
    margin: 0 auto 20px;
  }
  .coming-soon-desc {
    font-family: 'Crimson Pro', serif;
    font-size: 14px; font-style: italic;
    color: rgba(200,216,238,0.5);
    line-height: 1.7;
    max-width: 260px;
    margin: 0 auto;
  }

  /* ─── SIDEBAR ─── */
  .sidebar {
    width: 178px;
    background: linear-gradient(180deg, rgba(5,11,28,0.99) 0%, rgba(8,16,38,0.98) 40%, rgba(6,13,32,0.99) 100%);
    border-right: 1px solid rgba(232,201,106,0.22);
    flex-shrink: 0;
    display: flex; flex-direction: column;
    position: relative; overflow: hidden;
  }
  .sidebar::before {
    content: ''; position: absolute; top: 0; right: 0;
    width: 1px; height: 100%;
    background: linear-gradient(180deg, transparent 0%, rgba(232,201,106,0.6) 20%, rgba(232,201,106,0.6) 80%, transparent 100%);
    box-shadow: 0 0 8px rgba(232,201,106,0.15); z-index: 10;
  }
  .sidebar-nav { flex: 1; padding: 6px 0 4px; display: flex; flex-direction: column; gap: 0; }
  .nav-divider { display: flex; align-items: center; padding: 8px 12px 6px; gap: 6px; flex-shrink: 0; }
  .nav-divider::before, .nav-divider::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, transparent, rgba(232,201,106,0.28), transparent); }
  .nav-divider-gem { width: 5px; height: 5px; background: rgba(232,201,106,0.6); transform: rotate(45deg); flex-shrink: 0; box-shadow: 0 0 6px rgba(232,201,106,0.4); }
  .nav-item { display: flex; align-items: center; gap: 9px; padding: 7px 10px 7px 14px; cursor: pointer; position: relative; transition: all 0.18s ease; margin: 1px 6px 1px 0; border-radius: 0 6px 6px 0; border: 1px solid transparent; border-left: none; background: transparent; }
  .nav-item:hover { background: rgba(232,201,106,0.06); border-color: rgba(232,201,106,0.1); }
  .nav-item.active { background: linear-gradient(90deg, rgba(74,144,217,0.14) 0%, rgba(74,144,217,0.06) 100%); border-color: rgba(232,201,106,0.18); box-shadow: inset 0 0 12px rgba(74,144,217,0.08); }
  .nav-item.active::before { content: ''; position: absolute; left: 0; top: 50%; transform: translateY(-50%); width: 2.5px; height: 55%; background: linear-gradient(180deg, rgba(232,201,106,0.4), var(--gold), rgba(232,201,106,0.4)); border-radius: 0 2px 2px 0; box-shadow: 0 0 8px rgba(232,201,106,0.7), 0 0 16px rgba(232,201,106,0.3); }
  .nav-icon { width: 24px; height: 24px; border-radius: 6px; display: flex; align-items: center; justify-content: center; background: transparent; flex-shrink: 0; overflow: hidden; transition: all 0.18s; }
  .nav-icon img { width: 18px; height: 18px; object-fit: contain; filter: brightness(0.55) saturate(0.6); transition: filter 0.18s; }
  .nav-item:hover .nav-icon img { filter: brightness(0.8) saturate(0.8); }
  .nav-item.active .nav-icon { background: rgba(232,201,106,0.1); }
  .nav-item.active .nav-icon img { filter: brightness(1) saturate(1.2) drop-shadow(0 0 5px rgba(232,201,106,0.7)); }
  .nav-label { font-family: 'Cinzel', serif; font-size: 10.5px; font-weight: 600; color: rgba(200,216,238,0.45); letter-spacing: 0.5px; transition: color 0.18s; }
  .nav-item:hover .nav-label { color: rgba(200,216,238,0.7); }
  .nav-item.active .nav-label { color: var(--gold-light); text-shadow: 0 0 12px rgba(232,201,106,0.4); }

  /* ─── CHAR PANEL ─── */
  .char-panel {
    width: 110px; flex-shrink: 0;
    background: linear-gradient(180deg, rgba(5,11,28,0.99) 0%, rgba(8,16,38,0.98) 100%);
    border-left: 1px solid rgba(232,201,106,0.18);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .char-panel-header {
    height: var(--topbar-h);
    display: flex; align-items: center; justify-content: center;
    border-bottom: 1px solid rgba(232,201,106,0.15);
    padding: 0 6px; flex-shrink: 0;
  }
  .portrait-card {
    flex: 1; position: relative;
    border-bottom: 1px solid rgba(232,201,106,0.1);
    overflow: hidden; cursor: pointer;
    transition: border-color 0.2s;
    min-height: 0;
  }
  .portrait-card:hover { border-color: rgba(232,201,106,0.65); box-shadow: 0 0 12px rgba(232,201,106,0.2); }
  .portrait-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, rgba(232,201,106,0.3), transparent); z-index: 3; }
  .portrait-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; object-position: top center; z-index: 2; }
  .portrait-ph { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
  .portrait-ph.ph-blue   { background: radial-gradient(circle at 40% 30%, #2a5a9a, #0e2050, #060e28); }
  .portrait-ph.ph-purple { background: radial-gradient(circle at 40% 30%, #4a2870, #1e0e40, #080418); }
  .portrait-ph.ph-gold   { background: radial-gradient(circle at 40% 30%, #8a6020, #3a2808, #120e04); }
  .portrait-gem { position: absolute; top: 6px; right: 6px; width: 5px; height: 5px; background: rgba(232,201,106,0.7); transform: rotate(45deg); z-index: 4; box-shadow: 0 0 6px rgba(232,201,106,0.5); }
  .portrait-name { position: absolute; bottom: 0; left: 0; right: 0; padding: 14px 4px 5px; text-align: center; font-family: 'Cinzel', serif; font-size: 8.5px; font-weight: 700; color: var(--gold-light); letter-spacing: 0.5px; background: linear-gradient(transparent, rgba(4,10,28,0.92)); z-index: 4; }

  .sidebar-brand { display: flex; align-items: center; gap: 10px; padding: 14px 14px 12px; border-bottom: 1px solid rgba(232,201,106,0.2); flex-shrink: 0; }
  .sidebar-brand-logo { width: 38px; height: 38px; object-fit: contain; border-radius: 50%; border: 1.5px solid rgba(232,201,106,0.65); box-shadow: 0 0 10px rgba(232,201,106,0.25); flex-shrink: 0; }
  .sidebar-brand-name { font-family: 'Cinzel', serif; font-size: 13px; font-weight: 700; color: var(--gold-light); letter-spacing: 1px; text-shadow: 0 0 10px rgba(232,201,106,0.4); line-height: 1.2; }
  .sidebar-brand-sub { font-family: 'Cinzel', serif; font-size: 9px; font-weight: 400; color: rgba(200,216,238,0.5); letter-spacing: 0.5px; margin-top: 1px; }
</style>
</head>
<body>

<div class="wrapper">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-brand">
      <img src="assets/dashboard/logoloki.png" alt="Loki" class="sidebar-brand-logo">
      <div class="sidebar-brand-text">
        <div class="sidebar-brand-name">Loki</div>
        <div class="sidebar-brand-sub">the Wolf</div>
      </div>
    </div>
    <div class="sidebar-nav">
      <div class="nav-item" onclick="window.location.href='index.html'">
        <div class="nav-icon"><img src="assets/dashboard/icons/homes.png" alt="Home"/></div>
        <div class="nav-label">Home</div>
      </div>
      <div class="nav-item" onclick="window.location.href='summon.html'">
        <div class="nav-icon"><img src="assets/dashboard/icons/summons.png" alt="Summon"/></div>
        <div class="nav-label">Summon</div>
      </div>
      <div class="nav-item active">
        <div class="nav-icon"><img src="assets/dashboard/icons/quests.png" alt="Quests"/></div>
        <div class="nav-label">Quests</div>
      </div>
      <div class="nav-item" onclick="window.location.href='marketplace.html'">
        <div class="nav-icon"><img src="assets/dashboard/icons/marketplace.png" alt="Marketplace"/></div>
        <div class="nav-label">Marketplace</div>
      </div>
      <div class="nav-divider"><div class="nav-divider-gem"></div></div>
      <div class="nav-item" onclick="window.location.href='buy.html'">
        <div class="nav-icon"><img src="assets/dashboard/icons/shops.png" alt="Buy"/></div>
        <div class="nav-label">Buy</div>
      </div>
      <div class="nav-item" onclick="window.location.href='codex.html'">
        <div class="nav-icon"><img src="assets/dashboard/icons/codex.png" alt="Codex"/></div>
        <div class="nav-label">Codex</div>
      </div>
      <div class="nav-item" onclick="window.location.href='info.html'">
        <div class="nav-icon"><img src="assets/dashboard/icons/info.png" alt="Info"/></div>
        <div class="nav-label">Info</div>
      </div>
      <div style="flex:1;"></div>
      <div class="nav-divider"><div class="nav-divider-gem"></div></div>
      <div class="nav-item" onclick="window.location.href='profile.html'">
        <div class="nav-icon"><img src="assets/dashboard/icons/profile.png" alt="Profile"/></div>
        <div class="nav-label">Profile</div>
      </div>
    </div>
  </div>

  <!-- CENTER COLUMN -->
  <div class="center-col">
    <div class="topbar">
      <div class="top-spacer"></div>
      <div class="currency-group">
        <div class="currency-pill">
          <span class="icon"><img src="assets/buy/wolfgold.jpg" alt="" style="width:18px;height:18px;object-fit:contain;vertical-align:middle;"/></span>
          0<div class="plus-btn">+</div>
        </div>
        <div class="currency-pill">
          <span class="icon"><img src="assets/buy/wolfcoin.jpg" alt="" style="width:18px;height:18px;object-fit:contain;vertical-align:middle;"/></span>
          0<div class="plus-btn">+</div>
        </div>
        <div class="energy-pill">
          <span class="energy-icon">⚡</span>0/180
          <div class="plus-btn" style="background:rgba(160,96,255,0.8);color:white;">+</div>
        </div>
      </div>
    </div>
    <div class="body-row">
      <div class="quest-main">
        <div class="coming-soon-wrap">
          <div class="coming-soon-icon">⚔️</div>
          <div class="coming-soon-label">Chapter Awaits</div>
          <div class="coming-soon-title">Quests</div>
          <div class="coming-soon-sub">Coming Soon</div>
          <div class="coming-soon-divider"></div>
          <div class="coming-soon-desc">
            Quests will be available after the game launches.<br/>Prepare your hunter for the hunt ahead.
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="char-panel">
    <div class="char-panel-header">
      <div class="connect-wallet-btn">⬡</div>
    </div>
    <div class="portrait-card"><div class="portrait-gem"></div><div class="portrait-ph ph-blue"></div><img alt="Luna" class="portrait-img" onerror="this.style.display='none'" src="assets/dashboard/chars/luna.jpg"/><div class="portrait-name">Luna</div></div>
    <div class="portrait-card"><div class="portrait-gem"></div><div class="portrait-ph ph-gold"></div><img alt="Orion" class="portrait-img" onerror="this.style.display='none'" src="assets/dashboard/chars/orion.jpg"/><div class="portrait-name">Orion</div></div>
    <div class="portrait-card"><div class="portrait-gem"></div><div class="portrait-ph ph-purple"></div><img alt="Kael" class="portrait-img" onerror="this.style.display='none'" src="assets/dashboard/chars/kael.jpg"/><div class="portrait-name">Kael</div></div>
    <div class="portrait-card"><div class="portrait-gem"></div><div class="portrait-ph ph-blue"></div><img alt="Iris" class="portrait-img" onerror="this.style.display='none'" src="assets/dashboard/chars/iris.jpg"/><div class="portrait-name">Iris</div></div>
  </div>

</div>

<script src="sidebar.js"></script>
<script>loadSidebar('quests');</script>
</body>
</html>
